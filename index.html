<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>DUNGEON</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:monospace;}
canvas{display:block;cursor:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
#ui{position:absolute;bottom:4px;left:0;right:0;color:rgba(255,255,255,.18);font:9px monospace;text-align:center;letter-spacing:.07em;user-select:none;pointer-events:none;}
#ui b{color:rgba(255,255,255,.32);}
</style>
</head>
<body>
<canvas id="c" width="960" height="540"></canvas>
<div id="ui">WASD move &nbsp;·&nbsp; <b>MOUSE aim+shoot</b> &nbsp;·&nbsp; SPACE dash &nbsp;·&nbsp; E interact/shop &nbsp;·&nbsp; kill for XP, gold &amp; drops</div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=960,H=540;

// Responsive: scale canvas to fill the viewport, maintaining 16:9
function resizeCanvas(){
  const scale=Math.min(window.innerWidth/W, window.innerHeight/H);
  C.style.width=Math.round(W*scale)+'px';
  C.style.height=Math.round(H*scale)+'px';
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

// Touch input mapped to mouse
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=C.getBoundingClientRect(),t=e.touches[0];
  M.x=(t.clientX-r.left)*(W/r.width);M.y=(t.clientY-r.top)*(H/r.height);
  M.down=true;M.clicked=true;
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=C.getBoundingClientRect(),t=e.touches[0];
  M.x=(t.clientX-r.left)*(W/r.width);M.y=(t.clientY-r.top)*(H/r.height);
},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();M.down=false;},{passive:false});
let NOW=0;
const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(ax,ay,bx,by)=>Math.hypot(ax-bx,ay-by);
const angle=(ax,ay,bx,by)=>Math.atan2(by-ay,bx-ax);

// Input
const K=new Set(),M={x:W/2,y:H/2,down:false,clicked:false,rclicked:false};
let ePressed=false;  // consumed once per keydown, like M.clicked
window.addEventListener('keydown',e=>{
  K.add(e.code);e.preventDefault();
  if(e.code==='KeyE')ePressed=true;
  // Open pending level-up with TAB
  if(e.code==='Tab'&&G&&G.levelUpPending&&!G.levelUpChoices&&!G.shopOpen){
    G.levelUpChoices=rollLevelUp();G.levelUpPending=false;G.paused=true;
  }
});
window.addEventListener('keyup',e=>K.delete(e.code));
window.addEventListener('blur',()=>{K.clear();M.down=false;});
C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();M.x=(e.clientX-r.left)*(W/r.width);M.y=(e.clientY-r.top)*(H/r.height);});
C.addEventListener('mousedown',e=>{if(e.button===0){M.down=true;M.clicked=true;}if(e.button===2)M.rclicked=true;});
C.addEventListener('mouseup',e=>{if(e.button===0)M.down=false;});
C.addEventListener('contextmenu',e=>e.preventDefault());

// ═══════════════════════════════════════════════
// TILE TEXTURES  (biome-aware, rebuilt each floor)
// ═══════════════════════════════════════════════
const TEX={};
const _TS=80; // offscreen sprite resolution — larger = more detail

function makeTile(drawFn){
  const oc=new OffscreenCanvas(_TS,_TS);
  drawFn(oc.getContext('2d'));
  return oc;
}

// ── Biome helper ──────────────────────────────────────────────────────────────
function getBiome(floor){
  if(floor<=2) return 'forest';
  if(floor<=4) return 'swamp';
  if(floor<=6) return 'rocky';
  if(floor<=8) return 'tundra';
  return 'volcanic';
}

// ── Low-level noise helpers ───────────────────────────────────────────────────
// Cheap value noise: deterministic hash → float in [0,1)
function _hash(x,y,seed){
  let h=(x*374761393+y*668265263+seed*2147483647)&0x7fffffff;
  h=((h>>16)^h)*0x45d9f3b&0x7fffffff;
  h=((h>>16)^h)*0x45d9f3b&0x7fffffff;
  return (h&0x7fffffff)/0x7fffffff;
}
// Smooth bilinear noise in [0,1) over a _TS×_TS canvas, frequency controls granularity
function _noiseLayer(tc,freq,alpha,col,seed,size){
  const S=size||_PS,cs=S/freq;
  tc.globalAlpha=alpha;
  for(let gy=0;gy<freq+1;gy++){
    for(let gx=0;gx<freq+1;gx++){
      const v=_hash(gx,gy,seed);
      // draw a soft blurred dot at each grid vertex — blending gives smooth noise
      const x=gx*cs,y=gy*cs,r=cs*.9;
      const g=tc.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,col.replace(')',`,${v.toFixed(2)})`).replace('rgb','rgba'));
      g.addColorStop(1,'rgba(0,0,0,0)');
      tc.fillStyle=g;tc.fillRect(x-r,y-r,r*2,r*2);
    }
  }
  tc.globalAlpha=1;
}

// ── SEAMLESS PATTERN GENERATORS ──────────────────────────────────────────────
// Build a large tileable canvas used as a ctx.createPattern() source.
// PS = pattern size in pixels (must be power-of-2 friendly for GPU tiling)
const _PS=256;

function _makePattern(drawFn){
  const oc=new OffscreenCanvas(_PS,_PS);
  drawFn(oc.getContext('2d'));
  return oc; // used as pattern source via ctx.createPattern(oc,'repeat')
}

// ── Grass ground pattern (forest biome) ──────────────────────────────────────
function _buildGrassPattern(){
  return _makePattern(tc=>{
    const S=_PS;
    // Base — gradient from lighter centre to darker edges for depth variety
    tc.fillStyle='#4e8840';tc.fillRect(0,0,S,S);
    // Multi-frequency colour noise — large blobs first for macro variation
    _noiseLayer(tc,3,.28,'rgb(38,70,20)',17);
    _noiseLayer(tc,6,.2,'rgb(80,130,30)',31);
    _noiseLayer(tc,12,.14,'rgb(25,50,10)',53);
    _noiseLayer(tc,20,.08,'rgb(100,160,40)',71);
    // Sunlight dapple — scattered soft bright patches
    for(let i=0;i<14;i++){
      const dx=_hash(i,0,200)*S,dy=_hash(i,1,201)*S,dr=8+_hash(i,2,202)*18;
      const dg=tc.createRadialGradient(dx,dy,0,dx,dy,dr);
      dg.addColorStop(0,'rgba(180,230,80,.16)');dg.addColorStop(1,'rgba(0,0,0,0)');
      tc.fillStyle=dg;tc.fillRect(dx-dr,dy-dr,dr*2,dr*2);
    }
    // Dense individual grass blades — varied angle, length, shade
    for(let i=0;i<160;i++){
      const gx=_hash(i,3,203)*S,gy=_hash(i,4,204)*S;
      const len=3+_hash(i,5,205)*8,angle=(_hash(i,6,206)-.5)*1.4-Math.PI/2;
      const shade=_hash(i,7,207);
      tc.strokeStyle=shade<.4?'rgba(22,52,8,.75)':shade<.75?'rgba(38,78,14,.65)':'rgba(55,100,20,.55)';
      tc.lineWidth=.7+_hash(i,8,208)*.8;
      // Slightly curved blade using quadratic bezier
      const cpx=gx+Math.cos(angle+.3)*len*.5,cpy=gy+Math.sin(angle+.3)*len*.5;
      tc.beginPath();tc.moveTo(gx,gy);tc.quadraticCurveTo(cpx,cpy,gx+Math.cos(angle)*len,gy+Math.sin(angle)*len);tc.stroke();
    }
    // Tiny dirt patches
    for(let i=0;i<12;i++){
      const dx=_hash(i,9,209)*S,dy=_hash(i,10,210)*S,dr=2+_hash(i,11,211)*5;
      const dg=tc.createRadialGradient(dx,dy,0,dx,dy,dr);
      dg.addColorStop(0,'rgba(75,48,18,.35)');dg.addColorStop(1,'rgba(0,0,0,0)');
      tc.fillStyle=dg;tc.fillRect(dx-dr,dy-dr,dr*2,dr*2);
    }
    // Scattered tiny flowers
    for(let i=0;i<8;i++){
      const fx=_hash(i,12,212)*S,fy=_hash(i,13,213)*S;
      const fc=_hash(i,14,214);
      tc.fillStyle=fc<.4?'rgba(230,220,60,.6)':fc<.7?'rgba(220,180,240,.5)':'rgba(255,255,255,.4)';
      tc.beginPath();tc.arc(fx,fy,1.5,0,Math.PI*2);tc.fill();
    }
  });
}

// ── Forest undergrowth (dark soil under trees) ────────────────────────────────
function _buildUndergrowtPattern(){
  return _makePattern(tc=>{
    const S=_PS;
    tc.fillStyle='#0c1608';tc.fillRect(0,0,S,S);
    _noiseLayer(tc,3,.4,'rgb(8,18,4)',19);
    _noiseLayer(tc,7,.25,'rgb(18,30,7)',37);
    _noiseLayer(tc,14,.15,'rgb(30,12,4)',59);
    // Dead leaves and debris
    for(let i=0;i<40;i++){
      const lx=_hash(i,0,300)*S,ly=_hash(i,1,301)*S;
      const lr=2+_hash(i,2,302)*5,la=_hash(i,3,303)*Math.PI;
      const lc=_hash(i,4,304);
      tc.fillStyle=lc<.5?`rgba(40,28,8,.5)`:`rgba(25,18,5,.4)`;
      tc.beginPath();tc.ellipse(lx,ly,lr,lr*.5,la,0,Math.PI*2);tc.fill();
    }
    // Exposed roots — thin curved lines
    tc.lineWidth=1;
    for(let i=0;i<20;i++){
      const rx=_hash(i,5,305)*S,ry=_hash(i,6,306)*S;
      const rl=10+_hash(i,7,307)*20;
      const ra=_hash(i,8,308)*Math.PI*2;
      tc.strokeStyle=`rgba(${35+Math.floor(_hash(i,9,309)*15)},${20+Math.floor(_hash(i,10,310)*10)},5,.45)`;
      tc.beginPath();tc.moveTo(rx,ry);
      tc.bezierCurveTo(rx+Math.cos(ra)*rl*.4,ry+Math.sin(ra)*rl*.4,rx+Math.cos(ra+.6)*rl*.8,ry+Math.sin(ra+.6)*rl*.8,rx+Math.cos(ra+.3)*rl,ry+Math.sin(ra+.3)*rl);
      tc.stroke();
    }
    // Moss patches
    for(let i=0;i<16;i++){
      const mx=_hash(i,11,311)*S,my=_hash(i,12,312)*S,mr=4+_hash(i,13,313)*12;
      const mg=tc.createRadialGradient(mx,my,0,mx,my,mr);
      mg.addColorStop(0,'rgba(18,45,8,.7)');mg.addColorStop(.5,'rgba(12,30,5,.4)');mg.addColorStop(1,'rgba(0,0,0,0)');
      tc.fillStyle=mg;tc.fillRect(mx-mr,my-mr,mr*2,mr*2);
    }
  });
}

// ── Rocky void — dark cracked earth with deep shadowed crevices ──────────────
function _buildRockyVoidPattern(){
  return _makePattern(tc=>{
    const S=_PS;
    // Very dark base — shadowed rock face
    tc.fillStyle='#1a1208';tc.fillRect(0,0,S,S);
    _noiseLayer(tc,3,.45,'rgb(10,7,2)',77);
    _noiseLayer(tc,7,.3,'rgb(28,18,5)',89);
    _noiseLayer(tc,13,.18,'rgb(45,30,8)',101);
    // Deep crevice lines — near-black angular cracks
    tc.lineWidth=1.2;
    for(let i=0;i<22;i++){
      const x1=_hash(i,0,700)*S,y1=_hash(i,1,701)*S;
      const x2=x1+(_hash(i,2,702)-.5)*60,y2=y1+(_hash(i,3,703)-.5)*60;
      tc.strokeStyle=`rgba(5,3,0,${.6+_hash(i,4,704)*.3})`;
      tc.beginPath();tc.moveTo(x1,y1);
      tc.quadraticCurveTo(x1+(_hash(i,5,705)-.5)*20,y1+(_hash(i,6,706)-.5)*20,x2,y2);
      tc.stroke();
    }
    // Scattered dark boulders with faint highlight
    for(let i=0;i<18;i++){
      const bx=_hash(i,7,707)*S,by=_hash(i,8,708)*S,br=4+_hash(i,9,709)*10;
      const bg=tc.createRadialGradient(bx-br*.3,by-br*.3,0,bx,by,br);
      bg.addColorStop(0,'rgba(60,42,15,.55)');bg.addColorStop(.7,'rgba(22,14,4,.5)');bg.addColorStop(1,'rgba(0,0,0,0)');
      tc.fillStyle=bg;tc.beginPath();tc.ellipse(bx,by,br,br*.7,_hash(i,10,710)*Math.PI,0,Math.PI*2);tc.fill();
    }
  });
}

// ── Volcanic void — cooled black basalt, glowing fissures ────────────────────
function _buildVolcanicVoidPattern(){
  return _makePattern(tc=>{
    const S=_PS;
    tc.fillStyle='#100602';tc.fillRect(0,0,S,S);
    _noiseLayer(tc,3,.5,'rgb(6,3,0)',113);
    _noiseLayer(tc,7,.3,'rgb(20,10,2)',127);
    // Glowing lava fissure cracks
    for(let i=0;i<14;i++){
      const x1=_hash(i,0,800)*S,y1=_hash(i,1,801)*S;
      const x2=x1+(_hash(i,2,802)-.5)*70,y2=y1+(_hash(i,3,803)-.5)*70;
      // Outer glow
      tc.strokeStyle=`rgba(160,50,5,${.18+_hash(i,4,804)*.12})`;tc.lineWidth=3.5;
      tc.beginPath();tc.moveTo(x1,y1);tc.quadraticCurveTo(x1+(_hash(i,5,805)-.5)*18,y1+(_hash(i,6,806)-.5)*18,x2,y2);tc.stroke();
      // Inner bright core
      tc.strokeStyle=`rgba(255,140,20,${.35+_hash(i,7,807)*.25})`;tc.lineWidth=.8;
      tc.beginPath();tc.moveTo(x1,y1);tc.quadraticCurveTo(x1+(_hash(i,5,805)-.5)*18,y1+(_hash(i,6,806)-.5)*18,x2,y2);tc.stroke();
    }
    // Cooled basalt plates — dark polygons with slight sheen
    for(let i=0;i<16;i++){
      const px=_hash(i,8,808)*S,py=_hash(i,9,809)*S,pr=6+_hash(i,10,810)*14;
      const sides=5+Math.floor(_hash(i,11,811)*3);
      tc.beginPath();
      for(let j=0;j<sides;j++){
        const a=(j/sides)*Math.PI*2+_hash(j,i,812)*.5;
        const r=pr*(.6+_hash(j,i+1,813)*.4);
        j===0?tc.moveTo(px+Math.cos(a)*r,py+Math.sin(a)*r*.7):tc.lineTo(px+Math.cos(a)*r,py+Math.sin(a)*r*.7);
      }
      tc.closePath();
      tc.fillStyle=`rgba(18,10,3,${.4+_hash(i,12,814)*.3})`;tc.fill();
      tc.strokeStyle='rgba(80,35,5,.3)';tc.lineWidth=.6;tc.stroke();
    }
  });
}

// ── Sandy/rocky ground ────────────────────────────────────────────────────────
function _buildSandPattern(){
  return _makePattern(tc=>{
    const S=_PS;
    tc.fillStyle='#a88850';tc.fillRect(0,0,S,S);
    _noiseLayer(tc,3,.3,'rgb(70,50,15)',23);
    _noiseLayer(tc,8,.2,'rgb(180,155,80)',41);
    _noiseLayer(tc,15,.12,'rgb(50,35,8)',67);
    // Sand ripple streaks
    for(let i=0;i<18;i++){
      const sy=_hash(i,0,400)*S;
      tc.strokeStyle=`rgba(200,170,90,${.06+_hash(i,1,401)*.1})`;tc.lineWidth=.8;
      tc.beginPath();tc.moveTo(0,sy);
      for(let x=0;x<=S;x+=10)tc.lineTo(x,sy+(_hash(x,i,402)-.5)*4);
      tc.stroke();
    }
    // Embedded flat stones
    for(let i=0;i<20;i++){
      const sx=_hash(i,2,403)*S,sy=_hash(i,3,404)*S,sr=3+_hash(i,4,405)*9;
      const sides=4+Math.floor(_hash(i,5,406)*3);
      tc.beginPath();
      for(let j=0;j<sides;j++){
        const a=(j/sides)*Math.PI*2+_hash(j,i,407)*.6;
        const r=sr*(.7+_hash(j,i+1,408)*.45);
        j===0?tc.moveTo(sx+Math.cos(a)*r,sy+Math.sin(a)*r*.65):tc.lineTo(sx+Math.cos(a)*r,sy+Math.sin(a)*r*.65);
      }
      tc.closePath();
      const sg=tc.createLinearGradient(sx-sr*.3,sy-sr*.4,sx+sr*.3,sy+sr*.4);
      sg.addColorStop(0,'rgba(165,145,95,.55)');sg.addColorStop(1,'rgba(105,80,40,.45)');
      tc.fillStyle=sg;tc.fill();
      tc.strokeStyle='rgba(65,45,15,.35)';tc.lineWidth=.7;tc.stroke();
    }
  });
}

// ── Volcanic cracked rock ground ──────────────────────────────────────────────
function _buildLavaRockPattern(){
  return _makePattern(tc=>{
    const S=_PS;
    tc.fillStyle='#221008';tc.fillRect(0,0,S,S);
    _noiseLayer(tc,3,.45,'rgb(12,6,2)',29);
    _noiseLayer(tc,7,.28,'rgb(40,20,6)',43);
    _noiseLayer(tc,13,.12,'rgb(65,30,8)',71);
    // Basalt plate cracks — glowing orange seams
    for(let i=0;i<12;i++){
      const x1=_hash(i,0,500)*S,y1=_hash(i,1,501)*S;
      const x2=x1+(_hash(i,2,502)-.5)*80,y2=y1+(_hash(i,3,503)-.5)*80;
      // Glow halo
      tc.strokeStyle='rgba(180,60,5,.18)';tc.lineWidth=5;
      tc.beginPath();tc.moveTo(x1,y1);tc.lineTo(x2,y2);tc.stroke();
      // Core crack
      tc.strokeStyle='rgba(220,80,10,.5)';tc.lineWidth=1;
      tc.beginPath();tc.moveTo(x1,y1);tc.lineTo(x2,y2);tc.stroke();
    }
    // Hot spots
    for(let i=0;i<10;i++){
      const hx=_hash(i,4,504)*S,hy=_hash(i,5,505)*S,hr=3+_hash(i,6,506)*8;
      const hg=tc.createRadialGradient(hx,hy,0,hx,hy,hr);
      hg.addColorStop(0,'rgba(255,130,20,.22)');hg.addColorStop(.5,'rgba(180,60,5,.1)');hg.addColorStop(1,'rgba(0,0,0,0)');
      tc.fillStyle=hg;tc.fillRect(hx-hr,hy-hr,hr*2,hr*2);
    }
    // Ash patches
    for(let i=0;i<15;i++){
      const ax=_hash(i,7,507)*S,ay=_hash(i,8,508)*S,ar=4+_hash(i,9,509)*10;
      const ag=tc.createRadialGradient(ax,ay,0,ax,ay,ar);
      ag.addColorStop(0,'rgba(70,55,40,.3)');ag.addColorStop(1,'rgba(0,0,0,0)');
      tc.fillStyle=ag;tc.fillRect(ax-ar,ay-ar,ar*2,ar*2);
    }
  });
}

// ── Water animation frames ────────────────────────────────────────────────────
function _buildWaterTile(biome,frame){
  const oc=new OffscreenCanvas(128,128);
  const tc=oc.getContext('2d'),S=128,ph=frame*Math.PI*.7;
  if(biome==='volcanic'){
    tc.fillStyle='#5a1004';tc.fillRect(0,0,S,S);
    _noiseLayer(tc,4,.5,'rgb(140,40,5)',frame*3+1,S);
    _noiseLayer(tc,7,.3,'rgb(220,90,10)',frame*5+2,S);
    tc.strokeStyle='rgba(255,180,40,.55)';tc.lineWidth=1.5;
    for(let i=0;i<5;i++){const ry=_hash(i,0,frame+10)*S;tc.beginPath();for(let x=0;x<=S;x+=4)tc.lineTo(x,ry+Math.sin(x*.25+ph+i)*3);tc.stroke();}
    const hg=tc.createRadialGradient(S*.45,S*.4,2,S*.45,S*.4,S*.55);
    hg.addColorStop(0,'rgba(255,200,50,.35)');hg.addColorStop(1,'rgba(0,0,0,0)');
    tc.fillStyle=hg;tc.fillRect(0,0,S,S);
  } else if(biome==='tundra'){
    // Frozen ice pool — pale blue, cracked surface
    tc.fillStyle='#a8c8e0';tc.fillRect(0,0,S,S);
    _noiseLayer(tc,5,.2,'rgb(160,200,230)',frame*4+1,S);
    _noiseLayer(tc,9,.15,'rgb(200,230,255)',frame*6+2,S);
    tc.strokeStyle='rgba(80,120,160,.45)';tc.lineWidth=.8;
    for(let i=0;i<8;i++){const x1=_hash(i,0,frame+50)*S,y1=_hash(i,1,frame+51)*S,x2=x1+(_hash(i,2,frame+52)-.5)*30,y2=y1+(_hash(i,3,frame+53)-.5)*30;tc.beginPath();tc.moveTo(x1,y1);tc.lineTo(x2,y2);tc.stroke();}
    const ig=tc.createLinearGradient(0,S*.2+frame*4,0,S*.55);
    ig.addColorStop(0,'rgba(255,255,255,.3)');ig.addColorStop(1,'rgba(255,255,255,0)');
    tc.fillStyle=ig;tc.fillRect(0,0,S,S);
  } else if(biome==='swamp'){
    // Toxic murky water — dark olive-green
    tc.fillStyle='#0f1a08';tc.fillRect(0,0,S,S);
    _noiseLayer(tc,4,.4,'rgb(8,22,4)',frame*5+1,S);
    _noiseLayer(tc,8,.25,'rgb(25,50,10)',frame*3+2,S);
    // Toxic slick
    const tg=tc.createLinearGradient(0,S*.3+frame*3,0,S*.6);
    tg.addColorStop(0,'rgba(40,160,30,.18)');tg.addColorStop(1,'rgba(0,0,0,0)');
    tc.fillStyle=tg;tc.fillRect(0,0,S,S);
    tc.strokeStyle='rgba(50,180,40,.22)';tc.lineWidth=1;
    for(let i=0;i<4;i++){const ry=_hash(i,0,frame+60)*S;tc.beginPath();for(let x=0;x<=S;x+=5)tc.lineTo(x,ry+Math.sin(x*.28+ph+i)*2.5);tc.stroke();}
  } else if(biome==='rocky'){
    tc.fillStyle='#1c4838';tc.fillRect(0,0,S,S);
    _noiseLayer(tc,5,.3,'rgb(20,80,60)',frame*7+1,S);
    _noiseLayer(tc,9,.2,'rgb(60,130,100)',frame*3+2,S);
    const sh=tc.createLinearGradient(0,S*.2,0,S*.45);
    sh.addColorStop(0,'rgba(255,255,255,0)');sh.addColorStop(.5,'rgba(255,255,255,.1)');sh.addColorStop(1,'rgba(255,255,255,0)');
    tc.fillStyle=sh;tc.fillRect(0,0,S,S);
    tc.strokeStyle='rgba(180,230,210,.2)';tc.lineWidth=1;
    for(let i=0;i<4;i++){const ry=_hash(i,0,frame+20)*S;tc.beginPath();for(let x=0;x<=S;x+=5)tc.lineTo(x,ry+Math.sin(x*.3+ph+i)*2);tc.stroke();}
  } else {
    tc.fillStyle='#1a3a28';tc.fillRect(0,0,S,S);
    _noiseLayer(tc,5,.35,'rgb(15,50,30)',frame*9+1,S);
    _noiseLayer(tc,8,.2,'rgb(30,70,45)',frame*5+2,S);
    for(let i=0;i<3+frame;i++){
      const lx=_hash(i,7,frame+30)*S,ly=_hash(i,8,frame+31)*S,lr=6+_hash(i,9,frame+32)*8;
      tc.fillStyle='rgba(28,78,18,.6)';tc.beginPath();tc.arc(lx,ly,lr,0,Math.PI*2);tc.fill();
      tc.strokeStyle='rgba(50,100,25,.4)';tc.lineWidth=.8;tc.stroke();
      tc.strokeStyle='rgba(18,58,8,.5)';tc.lineWidth=.6;
      tc.beginPath();tc.moveTo(lx,ly);tc.lineTo(lx,ly-lr);tc.stroke();
      tc.beginPath();tc.moveTo(lx,ly);tc.lineTo(lx-lr*.7,ly-lr*.5);tc.stroke();
      tc.beginPath();tc.moveTo(lx,ly);tc.lineTo(lx+lr*.7,ly-lr*.5);tc.stroke();
    }
    tc.strokeStyle='rgba(100,180,130,.18)';tc.lineWidth=1;
    for(let i=0;i<4;i++){const ry=_hash(i,10,frame+40)*S;tc.beginPath();for(let x=0;x<=S;x+=5)tc.lineTo(x,ry+Math.sin(x*.28+ph+i)*2.5);tc.stroke();}
  }
  return oc;
}

function buildTextures(floor){
  const biome=getBiome(floor||1);
  TEX.biome=biome;
  // Seamless pattern canvases
  if(biome==='forest'){
    TEX.groundSrc=_buildGrassPattern();
    TEX.voidSrc=_buildUndergrowtPattern();
  } else if(biome==='swamp'){
    TEX.groundSrc=_buildSwampPattern();
    TEX.voidSrc=_buildSwampVoidPattern();
  } else if(biome==='rocky'){
    TEX.groundSrc=_buildSandPattern();
    TEX.voidSrc=_buildRockyVoidPattern();
  } else if(biome==='tundra'){
    TEX.groundSrc=_buildTundraPattern();
    TEX.voidSrc=_buildTundraVoidPattern();
  } else {
    TEX.groundSrc=_buildLavaRockPattern();
    TEX.voidSrc=_buildVolcanicVoidPattern();
  }
  TEX.water=[_buildWaterTile(biome,0),_buildWaterTile(biome,1)];
  TEX.lava=TEX.water;
  TEX._bgPat=null;
  // Convenience aliases
  TEX.void=TEX.voidSrc;
  TEX.voidV=[TEX.voidSrc,TEX.voidSrc,TEX.voidSrc,TEX.voidSrc];
  TEX.floor=TEX.groundSrc;
  TEX.floorV=[TEX.groundSrc,TEX.groundSrc,TEX.groundSrc,TEX.groundSrc];
}

// VOID tile functions below kept as stubs (no longer used for main rendering)
function drawVoidForest(variant,tc){
  const S=_TS,v=variant;
  // Rich dark soil base
  tc.fillStyle='#0a1506';tc.fillRect(0,0,S,S);
  _noiseLayer(tc,5,.5,'rgb(6,16,3)',v*7+1);
  _noiseLayer(tc,9,.3,'rgb(18,32,7)',v*13+2);
  _noiseLayer(tc,3,.2,'rgb(28,12,4)',v*5+3);

  // Mossy ground cover
  for(let i=0;i<8;i++){
    const mx=_hash(i,20,v*3+1)*S,my=_hash(i,21,v*3+2)*S;
    const r=5+_hash(i,22,v*3+3)*9;
    const g=tc.createRadialGradient(mx,my,0,mx,my,r);
    g.addColorStop(0,'rgba(20,48,9,.85)');g.addColorStop(.5,'rgba(12,30,5,.5)');g.addColorStop(1,'rgba(0,0,0,0)');
    tc.fillStyle=g;tc.fillRect(mx-r,my-r,r*2,r*2);
  }

  // Tree trunks — tapered bezier, centres spread beyond tile edges for organic bleed
  const trunkCentres=[
    [S*(.1+_hash(0,50,v)*.15), S+4, 4+_hash(0,51,v)*3],
    [S*(.35+_hash(1,50,v)*.2), S+2, 4+_hash(1,51,v)*3],
    [S*(.65+_hash(2,50,v)*.2), S+5, 3+_hash(2,51,v)*2],
    [S*(_hash(3,50,v)*.3),     S*.7+_hash(3,51,v)*8, 3+_hash(3,52,v)*2],
    [S*(.8+_hash(4,50,v)*.18), S*.75+_hash(4,51,v)*6, 3+_hash(4,52,v)*2],
  ];
  for(const[tx,ty,tr]of trunkCentres){
    tc.fillStyle=`rgba(${28+Math.floor(_hash(tx|0,ty|0,v)*12)},${16+Math.floor(_hash(tx|0,ty|0,v+1)*8)},6,.9)`;
    tc.beginPath();
    tc.moveTo(tx-tr*.6,ty);
    tc.bezierCurveTo(tx-tr*1.1,ty-12,tx-tr*.3,ty-18,tx,ty-20);
    tc.bezierCurveTo(tx+tr*.3,ty-18,tx+tr*1.1,ty-12,tx+tr*.6,ty);
    tc.closePath();tc.fill();
  }

  // Canopy blobs — allow centres to go outside tile (canvas clips automatically)
  // They're drawn larger and more spread so the blobs cross tile seams
  // Back layer
  for(let i=0;i<7;i++){
    const ox=(_hash(i,0,v+1)-.1)*S*1.15; // can go slightly negative or over S
    const oy=(_hash(i,1,v+2)-.05)*S*.7-2;
    const rx=12+_hash(i,2,v+3)*18,ry=10+_hash(i,3,v+4)*13;
    const angle=(_hash(i,7,v)-.5)*1.1;
    const lum=14+Math.floor(_hash(i,4,v)*10);
    tc.fillStyle=`rgba(${lum*.55|0},${lum},${lum*.3|0},.92)`;
    tc.beginPath();tc.ellipse(ox,oy,rx,ry,angle,0,Math.PI*2);tc.fill();
  }
  // Front layer — slightly brighter
  for(let i=0;i<6;i++){
    const ox=(_hash(i+10,0,v+5)-.05)*S*1.1;
    const oy=(_hash(i+10,1,v+6)-.02)*S*.62;
    const rx=10+_hash(i+10,2,v+7)*15,ry=8+_hash(i+10,3,v+8)*11;
    const angle=(_hash(i+10,7,v)-.5)*.9;
    const lum=20+Math.floor(_hash(i,8,v)*12);
    tc.fillStyle=`rgba(${lum*.55|0},${lum},${lum*.3|0},.88)`;
    tc.beginPath();tc.ellipse(ox,oy,rx,ry,angle,0,Math.PI*2);tc.fill();
  }
  // Sun rim — top arc of front blobs
  tc.strokeStyle='rgba(90,145,32,.28)';tc.lineWidth=1.4;
  for(let i=0;i<5;i++){
    const ox=(_hash(i+10,0,v+5)-.05)*S*1.1;
    const oy=(_hash(i+10,1,v+6)-.02)*S*.62;
    const rx=10+_hash(i+10,2,v+7)*15,ry=8+_hash(i+10,3,v+8)*11;
    tc.beginPath();tc.ellipse(ox,oy-ry*.15,rx*.88,ry*.38,0,Math.PI,0);tc.stroke();
  }
  // Hanging leaf wisps at bottom of tile
  tc.strokeStyle='rgba(25,60,10,.4)';tc.lineWidth=.9;
  for(let i=0;i<6;i++){
    const lx=_hash(i,30,v+6)*S,ly=_hash(i,31,v+7)*(S*.4)+S*.55;
    const len=5+_hash(i,32,v+8)*9;
    tc.beginPath();tc.moveTo(lx,ly);
    tc.bezierCurveTo(lx+_hash(i,33,v)*6-3,ly+len*.5,lx+_hash(i,34,v)*4-2,ly+len*.8,lx+_hash(i,35,v)*3-1.5,ly+len);
    tc.stroke();
  }
}

function drawVoidRocky(variant,tc){

  // Large rocks — centres can bleed outside tile boundary
  for(let i=0;i<5;i++){
    const rx=(_hash(i,0,v+20)-.1)*S*1.2;
    const ry=(_hash(i,1,v+21)-.1)*S*1.2;
    const rw=14+_hash(i,2,v+22)*20,rh=rw*(.5+_hash(i,3,v+23)*.4);
    const sides=5+Math.floor(_hash(i,4,v+24)*3);
    const pts=[];
    for(let j=0;j<sides;j++){
      const a=(j/sides)*Math.PI*2+_hash(j,i,v+25)*.5;
      const r=(rw*.5)*(.65+_hash(j,i+1,v+26)*.55);
      pts.push([rx+Math.cos(a)*r, ry+Math.sin(a)*r*rh/rw]);
    }
    const cg=tc.createRadialGradient(rx-rw*.15,ry-rh*.2,1,rx,ry,Math.max(rw,rh)*.65);
    cg.addColorStop(0,'#9a8460');cg.addColorStop(.5,'#705440');cg.addColorStop(1,'#3c2c18');
    tc.fillStyle=cg;tc.beginPath();tc.moveTo(pts[0][0],pts[0][1]);

    tc.closePath();tc.fill();
    tc.strokeStyle='rgba(190,160,95,.38)';tc.lineWidth=1;tc.stroke();
    // Shadow below rock
    const sg=tc.createLinearGradient(rx,ry+rh*.3,rx,ry+rh*.8);
    sg.addColorStop(0,'rgba(0,0,0,.3)');sg.addColorStop(1,'rgba(0,0,0,0)');
    tc.fillStyle=sg;tc.beginPath();tc.ellipse(rx,ry+rh*.35,rw*.5,rh*.3,0,0,Math.PI*2);tc.fill();

}

      j===0?tc.moveTo(sx+Math.cos(a)*r,sy+Math.sin(a)*r*.65):tc.lineTo(sx+Math.cos(a)*r,sy+Math.sin(a)*r*.65);
    }
    tc.closePath();
    const sg=tc.createLinearGradient(sx-sr*.3,sy-sr*.4,sx+sr*.3,sy+sr*.4);
    sg.addColorStop(0,'rgba(170,150,100,.6)');sg.addColorStop(1,'rgba(110,85,45,.5)');
    tc.fillStyle=sg;tc.fill();
    tc.strokeStyle='rgba(70,50,20,.4)';tc.lineWidth=.8;tc.stroke();
    // Stone highlight
    tc.strokeStyle='rgba(220,200,150,.3)';tc.lineWidth=.7;
    tc.beginPath();tc.arc(sx-sr*.15,sy-sr*.2,sr*.4,Math.PI,0);tc.stroke();
  }

  // Fine sand ripple streaks
  for(let i=0;i<5;i++){
    const sy=_hash(i,5,v+60)*S;
    tc.strokeStyle=`rgba(200,175,110,${.08+_hash(i,6,v+61)*.1})`;tc.lineWidth=.8;
    tc.beginPath();tc.moveTo(0,sy);
    for(let x=0;x<=S;x+=8)tc.lineTo(x,sy+(_hash(x,i,v+62)-.5)*3);
    tc.stroke();
  }
}

function drawFloorVolcanic(variant,tc){
  const S=_TS,v=variant;
  tc.fillStyle='#2a1608';tc.fillRect(0,0,S,S);
  _noiseLayer(tc,4,.4,'rgb(15,8,3)',v*11+1);

  // Cracked basalt polygon plates

  for(let i=0;i<plateCount;i++){
    const px=_hash(i,0,v+70)*S,py=_hash(i,1,v+71)*S;
    const pr=12+_hash(i,2,v+72)*18;
    const sides=5+Math.floor(_hash(i,3,v+73)*2);
    tc.beginPath();
    for(let j=0;j<sides;j++){
      const a=(j/sides)*Math.PI*2+_hash(j,i,v+74)*.5;
      const r=pr*(.7+_hash(j,i+1,v+75)*.45);
      j===0?tc.moveTo(px+Math.cos(a)*r,py+Math.sin(a)*r*.8):tc.lineTo(px+Math.cos(a)*r,py+Math.sin(a)*r*.8);
    }

  for(let i=0;i<3+v%2;i++){

function drawWaterTile(biome,frame,tc){
  const S=_TS,ph=frame*Math.PI*.7;

    tc.fillStyle='#5a1004';tc.fillRect(0,0,S,S);

      const ry=_hash(i,0,frame+10)*S;
      tc.beginPath();for(let x=0;x<=S;x+=4)tc.lineTo(x,ry+Math.sin(x*.25+ph+i)*3);tc.stroke();
    }

    hg.addColorStop(0,'rgba(255,200,50,.35)');hg.addColorStop(1,'rgba(0,0,0,0)');

    sh.addColorStop(0,'rgba(255,255,255,0)');sh.addColorStop(.5,'rgba(255,255,255,.1)');sh.addColorStop(1,'rgba(255,255,255,0)');
    tc.fillStyle=sh;tc.fillRect(0,0,S,S);

      tc.beginPath();for(let x=0;x<=S;x+=5)tc.lineTo(x,ry+Math.sin(x*.3+ph+i)*2);tc.stroke();

    _noiseLayer(tc,5,.35,'rgb(15,50,30)',frame*9+1);

      tc.fillStyle=`rgba(30,80,20,.6)`;tc.beginPath();tc.arc(lx,ly,lr,0,Math.PI*2);tc.fill();
      tc.strokeStyle='rgba(50,100,25,.4)';tc.lineWidth=.8;tc.stroke();

      tc.strokeStyle='rgba(20,60,10,.5)';tc.lineWidth=.6;
      tc.beginPath();tc.moveTo(lx,ly);tc.lineTo(lx,ly-lr);tc.stroke();
      tc.beginPath();tc.moveTo(lx,ly);tc.lineTo(lx-lr*.7,ly-lr*.5);tc.stroke();
      tc.beginPath();tc.moveTo(lx,ly);tc.lineTo(lx+lr*.7,ly-lr*.5);tc.stroke();
    }
    tc.strokeStyle='rgba(100,180,130,.18)';tc.lineWidth=1;
    for(let i=0;i<3;i++){
      const ry=_hash(i,10,frame+40)*S;
      tc.beginPath();for(let x=0;x<=S;x+=5)tc.lineTo(x,ry+Math.sin(x*.28+ph+i)*2.5);tc.stroke();

// FX
// ═══════════════════════════════════════════════
const particles=[],shockwaves=[],floats=[];
let trauma=0,SX=0,SY=0,SR=0;
let FL={r:0,g:0,b:0,a:0};
let btFrozen=0; // bullet time

function shake(t){trauma=clamp(trauma+t,0,1);}
function flash(r,g,b,a){FL.r=r;FL.g=g;FL.b=b;FL.a=clamp(FL.a+a,0,1);}
function tickFX(dt){
  trauma=clamp(trauma-dt*2.5,0,1);
  const m=trauma*trauma;
  SX=rnd(-1,1)*18*m;SY=rnd(-1,1)*18*m;SR=rnd(-1,1)*.04*m;
  FL.a=clamp(FL.a-dt*4,0,1);
  if(btFrozen>0)btFrozen-=dt;
  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.px=p.x;p.py=p.y;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=p.drag;p.vy*=p.drag;p.vy+=p.gravity*dt;
    p.rot+=p.rotV*dt;
  }
  for(let i=shockwaves.length-1;i>=0;i--){
    const s=shockwaves[i];s.life-=dt*2.6;s.r=lerp(3,s.maxR,1-s.life);
    if(s.life<=0)shockwaves.splice(i,1);
  }
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i];f.life-=dt;f.y+=f.vy*dt;f.vy*=.9;f.scale=lerp(f.scale,1,dt*9);
    if(f.life<=0)floats.splice(i,1);
  }
}

function pEmit(x,y,o={}){
  const n=o.n||6;
  for(let i=0;i<n;i++){
    const a=o.ang!==undefined?o.ang+rnd(-.5,.5):rnd(0,Math.PI*2);
    const spd=(o.spd||140)*rnd(.3,1);
    particles.push({x,y,px:x,py:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      life:o.life||rnd(.2,.5),maxLife:o.life||rnd(.2,.5),size:o.sz||rnd(2,5),
      color:o.col||'#fff',type:o.type||'dot',glow:o.glow||14,
      gravity:o.grav||0,drag:o.drag||.87,rot:rnd(0,7),rotV:rnd(-8,8)});
  }
}
function spawnSW(x,y,col,maxR=70){shockwaves.push({x,y,r:3,maxR,life:1,col});}
function spawnFloat(x,y,txt,col='#fff',sz=13,life=.85){
  floats.push({x,y,txt,col,sz,life,maxLife:life,vy:-58,scale:1.4});
}

function drawFX(){
  // slow fields
  for(const s of G.slowFields||[]){
    const a=(s.life/s.maxLife)*.28;
    ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='#44eeff';ctx.shadowColor='#44eeff';ctx.shadowBlur=10;
    ctx.lineWidth=2;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(40,200,220,.06)';ctx.fill();ctx.restore();
  }
  // shockwaves
  for(const s of shockwaves){
    ctx.save();ctx.globalAlpha=s.life*.6;ctx.strokeStyle=s.col;ctx.shadowColor=s.col;
    ctx.shadowBlur=14*s.life;ctx.lineWidth=3*s.life;
    ctx.beginPath();ctx.arc(wx(s.x),wy(s.y),s.r,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  // particles
  for(const p of particles){
    const a=clamp(p.life/p.maxLife,0,1);
    ctx.save();ctx.globalAlpha=a;ctx.shadowColor=p.color;ctx.shadowBlur=p.glow*a;ctx.fillStyle=p.color;
    if(p.type==='spark'){
      ctx.translate(wx(p.x),wy(p.y));ctx.rotate(p.rot);
      const s=p.size*a;ctx.fillRect(-s*2,-s*.4,s*4,s*.8);
    } else if(p.type==='trail'){
      ctx.strokeStyle=p.color;ctx.lineWidth=p.size*a;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(wx(p.px),wy(p.py));ctx.lineTo(wx(p.x),wy(p.y));ctx.stroke();
    } else {ctx.beginPath();ctx.arc(wx(p.x),wy(p.y),p.size*a+.3,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
  // floats
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  for(const f of floats){
    const a=clamp(f.life/f.maxLife,0,1);
    ctx.save();ctx.translate(wx(f.x),wy(f.y));ctx.scale(f.scale,f.scale);ctx.globalAlpha=a;
    ctx.shadowColor=f.col;ctx.shadowBlur=10*a;ctx.font=`bold ${f.sz}px monospace`;
    ctx.fillStyle='#000';ctx.fillText(f.txt,1,1);
    ctx.fillStyle=f.col;ctx.fillText(f.txt,0,0);
    ctx.restore();
  }
  ctx.restore();
}

// ROOMS / OBSTACLES
// ═══════════════════════════════════════════════
// Rooms are just obstacle layouts that change each floor
// Obstacles are rectangular walls the player and enemies navigate around
let obstacles=[];
const ROOM_LAYOUTS=[
  // 0: open arena
  [],
  // 1: cross pillars
  [{x:160,y:160,w:40,h:40},{x:600,y:160,w:40,h:40},{x:160,y:400,w:40,h:40},{x:600,y:400,w:40,h:40},{x:370,y:270,w:60,h:60}],
  // 2: corridor maze
  [{x:100,y:50,w:20,h:180},{x:680,y:50,w:20,h:180},{x:100,y:370,w:20,h:180},{x:680,y:370,w:20,h:180},
   {x:200,y:200,w:180,h:20},{x:420,y:200,w:180,h:20},{x:200,y:380,w:180,h:20},{x:420,y:380,w:180,h:20}],
  // 3: ring of stones
  [{x:340,y:80,w:120,h:20},{x:340,y:500,w:120,h:20},{x:80,y:260,w:20,h:80},{x:700,y:260,w:20,h:80},
   {x:200,y:160,w:20,h:60},{x:580,y:160,w:20,h:60},{x:200,y:380,w:20,h:60},{x:580,y:380,w:20,h:60}],
  // 4: diagonal blockers
  [{x:150,y:100,w:30,h:200},{x:620,y:100,w:30,h:200},{x:150,y:300,w:200,h:30},{x:450,y:300,w:200,h:30},
   {x:350,y:130,w:100,h:100}],
  // 5: fortress walls
  [{x:180,y:180,w:440,h:20},{x:180,y:400,w:440,h:20},{x:180,y:180,w:20,h:240},{x:600,y:180,w:20,h:240},
   {x:280,y:180,w:20,h:80},{x:500,y:180,w:20,h:80},{x:280,y:320,w:20,h:80},{x:500,y:320,w:20,h:80}],
];

function pickLayout(floor){
  return ROOM_LAYOUTS[floor%ROOM_LAYOUTS.length];
}

function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function circleRect(cx2,cy2,cr,rx,ry,rw,rh){
  const nx=clamp(cx2,rx,rx+rw),ny=clamp(cy2,ry,ry+rh);
  return dist(cx2,cy2,nx,ny)<cr;
}
function pushOutRect(entity,r){
  // push entity circle of radius r out of all obstacles
  for(const o of obstacles){
    if(circleRect(entity.cx,entity.cy,r,o.x,o.y,o.w,o.h)){
      // find closest edge push
      const ox=entity.cx<o.x+o.w/2?o.x-r:o.x+o.w+r;
      const oy=entity.cy<o.y+o.h/2?o.y-r:o.y+o.h+r;
      const dx=Math.abs(entity.cx-ox),dy=Math.abs(entity.cy-oy);
      if(dx<dy)entity.x=ox-entity.w/2;else entity.y=oy-entity.h/2;
    }
  }
}

function isSolidTile(wx2,wy2){
  if(!G||!G.mapData)return false;
  const T=G.mapData.TILE,COLS=G.mapData.COLS,ROWS=G.mapData.ROWS;
  const tx=Math.floor(wx2/T),ty=Math.floor(wy2/T);
  if(tx<0||ty<0||tx>=COLS||ty>=ROWS)return true; // world edge = solid
  return G.mapData.grid[ty*COLS+tx]===0;
}

function pushOutWalls(entity,r){
  if(!G||!G.mapData)return;
  const T=G.mapData.TILE;
  // Test 4 cardinal probe points around the entity circle
  const probes=[
    [entity.cx,entity.cy-r],[entity.cx,entity.cy+r],
    [entity.cx-r,entity.cy],[entity.cx+r,entity.cy],
  ];
  for(const [px,py] of probes){
    if(!isSolidTile(px,py))continue;
    const T2=T;
    const tx=Math.floor(px/T2),ty=Math.floor(py/T2);
    const tileLeft=tx*T2,tileRight=(tx+1)*T2,tileTop=ty*T2,tileBot=(ty+1)*T2;
    // Push out on the axis with smallest overlap
    const overlapL=entity.cx+r-tileLeft;
    const overlapR=tileRight-(entity.cx-r);
    const overlapT=entity.cy+r-tileTop;
    const overlapB=tileBot-(entity.cy-r);
    const minX=overlapL<overlapR?-overlapL:overlapR;
    const minY=overlapT<overlapB?-overlapT:overlapB;
    if(Math.abs(minX)<=Math.abs(minY))entity.x+=minX;
    else entity.y+=minY;
  }
}

// STATUS EFFECTS
// ═══════════════════════════════════════════════
// Effects: burning, frozen, poisoned, stunned
// Applied to enemies via e.status[type]={timer, ...}
function applyStatus(entity, type, duration, val){
  if(!entity.status)entity.status={};
  entity.status[type]={timer:duration,val:val||1,maxTimer:duration};
}
function tickStatus(entity, dt){
  if(!entity.status)return;
  for(const type of Object.keys(entity.status)){
    const s=entity.status[type];
    s.timer-=dt;
    if(s.timer<=0){delete entity.status[type];continue;}
    if(type==='burning'&&Math.random()<dt*8){
      entity.hurt(s.val*dt);
      pEmit(entity.cx,entity.cy,{n:1,spd:30,life:.15,sz:3,col:'#ff6600',glow:12,grav:0,drag:.7});
    }
    if(type==='poisoned'&&Math.random()<dt*4){
      entity.hurt(s.val*dt);
      pEmit(entity.cx,entity.cy,{n:1,spd:20,life:.2,sz:3,col:'#44ff44',glow:10,grav:-20,drag:.8});
    }
  }
}
function getStatusSlow(entity){
  if(!entity.status)return 1;
  if(entity.status.frozen)return 0.1;
  if(entity.status.slowed)return 0.35;
  return 1;
}

let upgradeStacks={};

function rollLevelUp(){
  const p=G.player,lvl=p.level;
  const eligible=UPGRADES.filter(u=>(upgradeStacks[u.id]||0)<u.max);
  const weighted=[];
  for(const u of eligible){
    // base weight by tier
    let w=u.t===0?12:u.t===1?4:1;
    // boost rarity at higher levels
    if(u.t===1&&lvl>=5)w+=2;
    if(u.t===1&&lvl>=10)w+=3;
    if(u.t===2&&lvl>=8)w+=2;
    if(u.t===2&&lvl>=15)w+=4;
    for(let i=0;i<w;i++)weighted.push(u);
  }
  const picks=[];const seen=new Set();let att=0;
  while(picks.length<3&&att++<400){
    const u=weighted[Math.floor(Math.random()*weighted.length)];
    if(!seen.has(u.id)){picks.push(u);seen.add(u.id);}
  }
  return picks;
}

// ENTITY BASE
// ═══════════════════════════════════════════════
class Entity{
  constructor(x,y,w,h,hp){
    this.x=x;this.y=y;this.w=w;this.h=h;
    this.vx=0;this.vy=0;this.angle=0;
    this.hp=hp;this.maxHp=hp;this.dead=false;this.hitFlash=0;
    this.status={};
  }
  get cx(){return this.x+this.w/2;}
  get cy(){return this.y+this.h/2;}
  move(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;}
  hurt(d,type=''){
    if(d<=0)return;
    this.hp-=d;this.hitFlash=1;
    if(this.hp<=0){this.hp=0;this.dead=true;this.onDeath();}
  }
  onDeath(){}
}

// ═══════════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════════
class Player extends Entity{
  constructor(){
    super(W/2-14,H/2-14,28,28,120);
    this.shootCd=0;this.invuln=0;
    this.bobT=0;this.scaleX=1;this.scaleY=1;
    this.dashCd=0;this.dashDur=0;this.dashVx=0;this.dashVy=0;this.dashCdBase=1.0;
    this.weapon=WEAPONS.pistol;
    this.xp=0;this.xpNext=80;this.level=1;
    this.speed=210;this.dmgMult=1;this.cdMult=1;
    this.gold=0;this.totalGold=0;
    this.shotsFired=0; // for overload
  }
  update(dt){
    let mx=0,my=0;
    if(K.has('KeyW')||K.has('ArrowUp'))my-=1;
    if(K.has('KeyS')||K.has('ArrowDown'))my+=1;
    if(K.has('KeyA')||K.has('ArrowLeft'))mx-=1;
    if(K.has('KeyD')||K.has('ArrowRight'))mx+=1;
    const l=Math.hypot(mx,my);const moving=l>0;
    if(moving){mx/=l;my/=l;}
    // last stand speed
    const lsBoost=this.lastStand&&this.hp/this.maxHp<.25?1.8:1;
    if(this.dashDur>0){
      this.dashDur-=dt;this.vx=this.dashVx;this.vy=this.dashVy;
      this.invuln=Math.max(this.invuln,this.dashDur+.05);
      pEmit(this.cx,this.cy,{n:2,spd:20,life:.12,sz:7,col:'#66aaff',glow:18,grav:0,drag:.4});
    } else {
      if(K.has('Space')&&this.dashCd<=0&&moving){
        this.dashDur=.18;this.dashCd=this.dashCdBase;
        this.dashVx=mx*540;this.dashVy=my*540;
        spawnSW(this.cx,this.cy,'#4488ff',32);shake(.07);
        if(this.bulletTime){btFrozen=.5;flash(80,160,255,.15);}
      }
      this.vx=mx*this.speed*lsBoost;this.vy=my*this.speed*lsBoost;
    }
    this.move(dt);
    this.x=clamp(this.x,4,WORLD_W-this.w-4);this.y=clamp(this.y,4,WORLD_H-this.h-4);
    pushOutRect(this,14);
    pushOutWalls(this,14);
    this.angle=Math.atan2((M.y+CAM.y)-this.cy,(M.x+CAM.x)-this.cx);
    if(this.shootCd>0)this.shootCd-=dt;
    if(this.dashCd>0)this.dashCd-=dt;
    if(this.invuln>0)this.invuln-=dt;
    this.hitFlash=clamp(this.hitFlash-dt*6,0,1);
    // bob
    this.bobT+=dt*(moving?11:0);
    this.scaleX=lerp(this.scaleX,1+(moving?Math.sin(this.bobT)*.055:0),dt*13);
    this.scaleY=lerp(this.scaleY,1-(moving?Math.sin(this.bobT)*.055:0),dt*13);
    if(moving&&Math.random()<.3)pEmit(this.cx+rnd(-3,3),this.cy+rnd(-3,3),{n:1,spd:18,life:.1,sz:4,col:'#3355cc',glow:10,drag:.45});
    // passive: regen
    if(this.regenRate&&this.hp<this.maxHp)this.hp=Math.min(this.maxHp,this.hp+this.regenRate*dt);
    // passive: barrier recharge
    if(this.barrierMax&&this.barrierHp<this.barrierMax){
      this.barrierCd-=dt;
      if(this.barrierCd<=0){this.barrierHp=this.barrierMax;spawnFloat(this.cx,this.y-28,'SHIELD','#4488ff',12,.6);}
    }
    // passive: orbital shard zaps
    if(this.orbitalShield){
      this.orbitalAngle=(this.orbitalAngle||0)+dt*2.4;
      const ox=this.cx+Math.cos(this.orbitalAngle)*42,oy=this.cy+Math.sin(this.orbitalAngle)*42;
      if(G){
        for(const e of G.enemies){if(!e.dead&&dist(ox,oy,e.cx,e.cy)<18){e.hurt(6);e.wobble=1;pEmit(ox,oy,{n:3,spd:60,life:.12,sz:2,col:'#aaffee',glow:12,drag:.7});}}
        if(G.boss&&!G.boss.dead)for(const bb of G.boss.bullets){if(!bb.dead&&dist(ox,oy,bb.x,bb.y)<20){bb.dead=true;spawnSW(ox,oy,'#aaffee',22);}}
      }
    }
    // soul harvest kill timer decay
    if(this.soulHarvest&&this.soulKillTimer>0){this.soulKillTimer-=dt;if(this.soulKillTimer<=0)this.soulKillBuf=0;}
  }
  tryShoot(){
    const cd=this.weapon.cd*(this.cdMult||1);
    if(this.shootCd<=0){this.shootCd=cd;return true;}
    return false;
  }
  gainXp(v){
    this.xp+=v;
    if(this.xp>=this.xpNext){this.xp-=this.xpNext;this.xpNext=Math.floor(this.xpNext*1.4+30);return true;}
    return false;
  }
  gainGold(v){this.gold+=v;this.totalGold+=v;}
  draw(){
    ctx.save();ctx.translate(wx(this.cx),wy(this.cy));ctx.rotate(this.angle);ctx.scale(this.scaleX,this.scaleY);
    if(this.invuln>0&&Math.floor(this.invuln*14)%2===0){ctx.restore();return;}
    // shadow
    ctx.save();ctx.globalAlpha=.18;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,11,11,4,0,0,Math.PI*2);ctx.fill();ctx.restore();
    // aura
    const wc=this.weapon.glow;
    const ac=this.hitFlash>.1?'#ff4444':wc;
    ctx.save();ctx.globalAlpha=.14+Math.sin(NOW*3)*.05+this.hitFlash*.2;
    ctx.shadowColor=ac;ctx.shadowBlur=28;ctx.fillStyle='rgba(0,0,0,0)';
    ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.fill();ctx.restore();
    const hf=this.hitFlash;
    const bc=hf>.1?`rgb(255,${Math.floor(lerp(150,50,hf))},${Math.floor(lerp(200,50,hf))})`:'#88ccff';
    const dk=hf>.1?'#ff2222':'#2244aa';
    // legs
    const lb=Math.sin(this.bobT)*4;
    ctx.fillStyle=dk;ctx.shadowColor=dk;ctx.shadowBlur=5;
    ctx.fillRect(-8,6+lb,7,9);ctx.fillRect(1,6-lb,7,9);
    // body
    ctx.fillStyle=bc;ctx.shadowColor=bc;ctx.shadowBlur=11;
    ctx.beginPath();ctx.roundRect(-9,-9,18,18,4);ctx.fill();
    ctx.fillStyle=dk;ctx.shadowBlur=0;ctx.fillRect(-2,-6,4,10);
    // eyes
    for(const ea of[-.3,.3]){
      const ex=Math.cos(ea)*6,ey=Math.sin(ea)*6-3;
      ctx.fillStyle='#fff';ctx.shadowColor='#aaddff';ctx.shadowBlur=7;
      ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#001133';ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(ex+1.2,ey,1.4,0,Math.PI*2);ctx.fill();
    }
    // gun
    const wc2=this.weapon.col;
    ctx.fillStyle=wc2;ctx.shadowColor=this.weapon.glow;ctx.shadowBlur=9;
    ctx.fillRect(6,-2,10,4);ctx.fillRect(12,-3,5,6);
    // muzzle flash
    const cd2=this.weapon.cd*(this.cdMult||1);
    if(this.shootCd>cd2-.07){
      const f=(this.shootCd-(cd2-.07))/.07;
      ctx.globalAlpha=f;ctx.shadowColor='#ffffaa';ctx.shadowBlur=20;
      ctx.fillStyle='#ffffcc';ctx.beginPath();ctx.arc(18,0,5,0,Math.PI*2);ctx.fill();
    }
    // orbital shard visible
    if(this.orbitalShield){
      ctx.restore();ctx.save();
      const oa=this.orbitalAngle||0;
      const ox=this.cx+Math.cos(oa)*42,oy=this.cy+Math.sin(oa)*42;
      ctx.translate(wx(ox),wy(oy));ctx.rotate(NOW*3.5);
      ctx.fillStyle='#aaffee';ctx.shadowColor='#aaffee';ctx.shadowBlur=14;
      for(let i=0;i<4;i++){const a=i*Math.PI/2;ctx.beginPath();ctx.moveTo(Math.cos(a)*9,Math.sin(a)*9);ctx.lineTo(Math.cos(a+.5)*5,Math.sin(a+.5)*5);ctx.lineTo(Math.cos(a+Math.PI)*9,Math.sin(a+Math.PI)*9);ctx.closePath();ctx.fill();}
    }
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// BULLET
// ═══════════════════════════════════════════════
class Bullet{
  constructor(x,y,ang,weapon,dmgMult,bounces,opts={}){
    this.x=x;this.y=y;this.px=x;this.py=y;
    const spd=weapon.spd*(opts.spdMult||1);
    this.vx=Math.cos(ang)*spd;this.vy=Math.sin(ang)*spd;
    this.angle=ang;this.dead=false;this.life=3.5;
    this.weapon=weapon;
    this.dmg=Math.round(weapon.dmg*dmgMult);
    this.bouncesLeft=bounces||0;
    // passive flags from opts
    this.pierce=opts.pierce||false;
    this.explosive=opts.explosive||false;
    this.reaper=opts.reaper||false;
    this.mega=opts.mega||false;
    this.crit=opts.crit||false;
    this.burnRounds=opts.burnRounds||false;
    this.poisonRounds=opts.poisonRounds||false;
    this.freezeRounds=opts.freezeRounds||false;
    if(this.mega)this.dmg*=5;
    if(this.crit)this.dmg=Math.round(this.dmg*3);
  }
  get cx(){return this.x;}get cy(){return this.y;}
  update(dt){
    this.px=this.x;this.py=this.y;
    const bd=btFrozen>0?.15:1;
    this.x+=this.vx*dt*bd;this.y+=this.vy*dt*bd;
    this.life-=dt;this.angle=Math.atan2(this.vy,this.vx);
    if(this.bouncesLeft>0){
      if(this.x<4||this.x>WORLD_W-4){this.vx*=-1;this.x=clamp(this.x,4,WORLD_W-4);this.bouncesLeft--;}
      if(this.y<4||this.y>WORLD_H-4){this.vy*=-1;this.y=clamp(this.y,4,WORLD_H-4);this.bouncesLeft--;}
      // bounce off obstacles
      for(const o of obstacles){
        if(circleRect(this.x,this.y,6,o.x,o.y,o.w,o.h)&&this.bouncesLeft>0){
          this.vx*=-1;this.vy*=-1;this.bouncesLeft--;
        }
      }
      // bounce off wall tiles
      if(this.bouncesLeft>0&&isSolidTile(this.x,this.y)){
        if(isSolidTile(this.x+this.vx*dt,this.y))this.vx*=-1;
        if(isSolidTile(this.x,this.y+this.vy*dt))this.vy*=-1;
        this.bouncesLeft--;
      }
    } else {
      if(this.x<-20||this.x>WORLD_W+20||this.y<-20||this.y>WORLD_H+20||this.life<=0)this.dead=true;
      // kill bullet on obstacle or wall tile hit (non-bouncer)
      if(!this.dead&&isSolidTile(this.x,this.y)){this.dead=true;pEmit(this.x,this.y,{n:4,spd:60,life:.1,sz:2,col:this.weapon.col,glow:10,drag:.6});}
      if(!this.dead)for(const o of obstacles){if(circleRect(this.x,this.y,5,o.x,o.y,o.w,o.h)){this.dead=true;pEmit(this.x,this.y,{n:4,spd:60,life:.1,sz:2,col:this.weapon.col,glow:10,drag:.6});break;}}
    }
    if(Math.random()<.55)pEmit(this.x,this.y,{n:1,spd:12,life:.07,sz:this.mega?5:2.5,col:this.weapon.col,glow:this.mega?20:10,drag:.5});
  }
  draw(){
    const dx=this.x-this.px,dy=this.y-this.py,l=Math.hypot(dx,dy)||1;
    const sz=this.mega?4.5:this.crit?1.5:1;
    const stretch=Math.min(l*.9,28)*sz;
    ctx.save();ctx.translate(wx(this.x),wy(this.y));ctx.rotate(this.angle);
    const gc=this.mega?'#ffffff':this.crit?'#ff44aa':this.weapon.glow;
    ctx.shadowColor=gc;ctx.shadowBlur=this.mega?34:18;
    ctx.globalAlpha=.5;ctx.fillStyle=this.mega?'#ffffcc':this.crit?'#ff44aa':this.weapon.col;
    ctx.beginPath();ctx.ellipse(-stretch/2,0,stretch/2+4*sz,4.5*sz,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=this.mega?20:10;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(-stretch/2,0,stretch/2,2.5*sz,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=20;ctx.beginPath();ctx.arc(0,0,2.5*sz,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

class EnemySlime extends Entity{
  constructor(x,y,floor){
    const hp=24+floor*10;
    super(x,y,26,26,hp);
    this.contactCd=0;this.bobT=rnd(0,7);this.wobble=0;
    this.spawnAnim=0;this.deathAnim=-1;this.eyeOff={x:0,y:0};
    this.spd=70+floor*4+rnd(-6,6);
    this.hue=rnd(100,155);this.xpDrop=10+floor*3;this.dmg=7+floor;
    this.goldDrop=rnd(3,8)|0;this.elite=false;
  }
  makeElite(){
    this.elite=true;this.hp*=2.5;this.maxHp*=2.5;this.spd*=1.4;this.dmg*=1.5;
    this.xpDrop*=3;this.goldDrop*=4;this.hue=rnd(30,60);// orange-gold tint
    this.w=34;this.h=34;
  }
  onDeath(){
    this.deathAnim=1;
    const col=`hsl(${this.hue},80%,55%)`;
    pEmit(this.cx,this.cy,{n:this.elite?26:16,spd:155,life:.5,sz:rnd(3,7),col,glow:18,grav:110,drag:.85});
    pEmit(this.cx,this.cy,{n:8,spd:210,type:'spark',life:.28,sz:3,col:'#ccffcc',glow:22,drag:.8});
    spawnSW(this.cx,this.cy,col,this.elite?75:50);
    spawnFloat(this.cx,this.cy-22,this.elite?'ELITE DOWN!':'SPLAT!',this.elite?'#ffdd00':'#44ff88',this.elite?17:14,this.elite?1.2:0.9);
  }
  update(dt,target){
    if(this.dead&&this.deathAnim>0){this.deathAnim=clamp(this.deathAnim-dt*4,0,1);return;}
    if(this.spawnAnim<1)this.spawnAnim=clamp(this.spawnAnim+dt*5,0,1);
    const sm=getStatusSlow(this);
    const eff=btFrozen>0?0.08:sm;
    const dx=target.cx-this.cx,dy=target.cy-this.cy,l=Math.hypot(dx,dy)||1;
    this.vx=(dx/l)*this.spd*eff;this.vy=(dy/l)*this.spd*eff;
    this.move(dt);pushOutRect(this,13);pushOutWalls(this,13);
    this.angle=Math.atan2(dy,dx);
    this.eyeOff.x=lerp(this.eyeOff.x,(dx/l)*3,dt*8);this.eyeOff.y=lerp(this.eyeOff.y,(dy/l)*3,dt*8);
    this.hitFlash=clamp(this.hitFlash-dt*5,0,1);this.wobble=clamp(this.wobble-dt*5,0,1);this.bobT+=dt*3.5;
    if(this.contactCd>0)this.contactCd-=dt;
    tickStatus(this,dt);
  }
  draw(){

    if(this.dead&&this.deathAnim<=0)return;
    const da=this.deathAnim>=0?this.deathAnim:1;
    const pop=this.dead?da:(this.spawnAnim<1?this.spawnAnim:1);
    const hf=this.hitFlash;
    const wobX=Math.sin(this.shakeT*8)*(this.stompCd>3?2:0);
    ctx.save();ctx.translate(wx(this.cx)+wobX,wy(this.cy));ctx.scale(pop,pop);ctx.globalAlpha=da;
    // shadow
    ctx.save();ctx.globalAlpha=.22*da;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,18+(this.elite?5:0),16+(this.elite?5:0),5,0,0,Math.PI*2);ctx.fill();ctx.restore();
    const col=hf>.1?'#ffcc66':'#885522';const r=this.elite?22:18;
    // body — hunched blocky shape
    ctx.fillStyle=col;ctx.shadowColor=hf>.1?'#ff8800':'#aa5500';ctx.shadowBlur=16;
    ctx.beginPath();ctx.moveTo(0,-r*1.1);ctx.bezierCurveTo(r*1.2,-r*.8,r*1.3,r*.6,r*.8,r*1.1);ctx.bezierCurveTo(r*.3,r*1.3,-r*.3,r*1.3,-r*.8,r*1.1);ctx.bezierCurveTo(-r*1.3,r*.6,-r*1.2,-r*.8,0,-r*1.1);ctx.fill();
    // inner dark core
    ctx.fillStyle=hf>.1?'#aa6600':'#441100';ctx.shadowBlur=3;
    ctx.beginPath();ctx.moveTo(0,-r*.6);ctx.bezierCurveTo(r*.7,-r*.4,r*.7,r*.4,0,r*.65);ctx.bezierCurveTo(-r*.7,r*.4,-r*.7,-r*.4,0,-r*.6);ctx.fill();
    // elite spikes
    if(this.elite){ctx.save();ctx.fillStyle='#ffdd00';ctx.shadowColor='#ffaa00';ctx.shadowBlur=10;for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.beginPath();ctx.moveTo(Math.cos(a)*r*.9,Math.sin(a)*r*.9);ctx.lineTo(Math.cos(a)*(r+10),Math.sin(a)*(r+10));ctx.lineTo(Math.cos(a+.15)*(r*.9),Math.sin(a+.15)*(r*.9));ctx.closePath();ctx.fill();}ctx.restore();}
    // eyes
    const ea=this.angle;
    for(const ex of[-5,5]){
      ctx.fillStyle='#ff4400';ctx.shadowColor='#ff3300';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(ex+Math.cos(ea)*4,Math.sin(ea)*4-4,3.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';ctx.shadowBlur=0;ctx.beginPath();ctx.arc(ex+Math.cos(ea)*5,Math.sin(ea)*5-4,1.8,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    if(!this.dead&&this.hp<this.maxHp){
      const bw=this.elite?52:42,bh=this.elite?5:4,bx=wx(this.cx)-bw/2,by=wy(this.y)-13;
      ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=this.elite?'#ffdd00':'#ff7722';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=5;
      ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);ctx.shadowBlur=0;
    }
  }
}

// ═══════════════════════════════════════════════
// BOSS
// ═══════════════════════════════════════════════
class Boss extends Entity{
  constructor(floor){
    const hp=500+floor*140; // more HP per floor
    super(W/2-36,55,72,72,hp);
    this.floor=floor;this.spawnAnim=0;this.deathAnim=-1;
    this.spd=60+floor*5;this.contactCd=0;this.dmg=26+floor*5;
    this.shootCd=0;this.shootInt=clamp(1.2-floor*.06,.32,1.2);
    this.xpDrop=200+floor*50;this.goldDrop=rnd(55,100)|0;
    this.angle=Math.PI/2;this.orbitAngle=0;this.bullets=[];
    this.shieldAng=0;
    this.shieldHp=floor>=6?3:floor>=3?2:floor>=1?1:0; // shields from floor 1
    this.shieldMax=this.shieldHp;
    this.enraged=false;
    this.phase=1; // 3 phases: transitions at 70% and 45%
    this.phaseT=0;
    this.spiralT=0; // spiral attack accumulator
    this.dashCd=0;  // dash charge attack
  }
  onDeath(){
    this.deathAnim=1;
    for(let i=0;i<5;i++)setTimeout(()=>{
      pEmit(this.cx+rnd(-25,25),this.cy+rnd(-20,20),{n:10,spd:rnd(80,280),life:rnd(.4,.9),sz:rnd(3,8),col:['#ff4444','#ff8800','#ffff44','#ff44ff'][i%4],glow:22,drag:.84});
      spawnSW(this.cx,this.cy,['#ff2200','#ffaa00','#ff44ff'][i%3],90+i*15);
    },i*120);
    shake(.9);flash(255,80,0,.6);
    spawnFloat(this.cx,this.cy-45,'BOSS SLAIN!','#ffdd00',26,2.2);
  }
  update(dt,target){
    if(this.spawnAnim<1)this.spawnAnim=clamp(this.spawnAnim+dt*2,0,1);
    if(this.deathAnim>0){this.deathAnim=clamp(this.deathAnim-dt*1.2,0,1);for(const b of this.bullets)b.dead=true;return;}
    // phase transitions — earlier to keep pressure on
    const hpFrac=this.hp/this.maxHp;
    if(this.phase<2&&hpFrac<.70){
      this.phase=2;this.spd*=1.25;this.shootInt*=.78;
      flash(255,100,0,.35);shake(.42);spawnFloat(this.cx,this.cy-40,'PHASE 2','#ff8800',18,1.4);
      // Restore 1 shield on transition
      if(this.shieldMax>0)this.shieldHp=Math.min(this.shieldMax,this.shieldHp+1);
    }
    if(this.phase<3&&hpFrac<.40){
      this.phase=3;this.enraged=true;this.spd*=1.5;this.shootInt*=.55;
      flash(255,0,0,.5);shake(.65);spawnFloat(this.cx,this.cy-40,'ENRAGED!','#ff2200',22,1.8);
      if(this.shieldMax>0)this.shieldHp=this.shieldMax; // fully restore shields at phase 3
    }
    this.phaseT+=dt;this.spiralT+=dt;this.shieldAng+=dt*(this.enraged?3.0:1.5);this.orbitAngle+=dt*.4;
    if(this.dashCd>0)this.dashCd-=dt;
    const eff=btFrozen>0?.08:1;
    const dx=target.cx-this.cx,dy=target.cy-this.cy,l=Math.hypot(dx,dy)||1;

    // Phase 2+: dash charge at player periodically
    if(this.phase>=2&&this.dashCd<=0&&l<350&&!this.dashing){
      this.dashing=true;this.dashCd=4.0-this.phase*.5;
      this.dashVx=(dx/l)*(500+this.floor*15);this.dashVy=(dy/l)*(500+this.floor*15);
      spawnSW(this.cx,this.cy,'#ff4400',55);flash(255,80,0,.18);
    }
    if(this.dashing){
      this.vx=lerp(this.vx,this.dashVx,dt*12);this.vy=lerp(this.vy,this.dashVy,dt*12);
      if(Math.hypot(this.vx,this.vy)<80)this.dashing=false;
    } else {
      const chase=.6+Math.sin(this.phaseT*.5)*.3;
      this.vx=lerp(this.vx,(dx/l)*this.spd*chase*eff+Math.cos(this.orbitAngle)*(55+this.phase*12)*eff,dt*2.5);
      this.vy=lerp(this.vy,(dy/l)*this.spd*chase*eff+Math.sin(this.orbitAngle)*(55+this.phase*12)*eff,dt*2.5);
    }
    this.move(dt);pushOutWalls(this,22);this.x=clamp(this.x,18,WORLD_W-this.w-18);this.y=clamp(this.y,18,WORLD_H-this.h-18);
    this.angle=Math.atan2(dy,dx);this.hitFlash=clamp(this.hitFlash-dt*3.5,0,1);
    if(this.contactCd>0)this.contactCd-=dt;

    // shooting by phase
    this.shootCd-=dt;
    if(this.shootCd<=0){
      this.shootCd=this.shootInt;
      const ang=Math.atan2(target.cy-this.cy,target.cx-this.cx);
      if(this.phase===1){
        // Single aimed + offset pair
        this.bullets.push(new BossBullet(this.cx,this.cy,ang,this.floor));
        if(this.floor>=3){for(let i=-1;i<=1;i+=2)this.bullets.push(new BossBullet(this.cx,this.cy,ang+i*.22,this.floor));}
      } else if(this.phase===2){
        // 3-way spread + spiral burst
        for(let i=-2;i<=2;i++)this.bullets.push(new BossBullet(this.cx,this.cy,ang+i*.22,this.floor));
        // Alternating spiral volley
        for(let i=0;i<6;i++)this.bullets.push(new BossBullet(this.cx,this.cy,this.spiralT*1.8+i*(Math.PI/3),this.floor));
      } else {
        // Phase 3: full ring + spiral + aimed
        for(let i=0;i<12;i++)this.bullets.push(new BossBullet(this.cx,this.cy,i*(Math.PI/6)+this.spiralT*2.5,this.floor));
        for(let i=-1;i<=1;i++)this.bullets.push(new BossBullet(this.cx,this.cy,ang+i*.18,this.floor));
      }
      spawnSW(this.cx,this.cy,'#ff2200',36);
    }
    for(let i=this.bullets.length-1;i>=0;i--){this.bullets[i].update(dt);if(this.bullets[i].dead)this.bullets.splice(i,1);}
  }
  draw(){
    if(this.dead&&this.deathAnim<=0)return;
    const da=this.deathAnim>=0?this.deathAnim:1;
    const pop=this.dead?da:(this.spawnAnim<1?this.spawnAnim:1);
    const hf=this.hitFlash;
    const enrCol=this.enraged?`hsl(${0+Math.sin(NOW*8)*20},100%,55%)`:'#cc2200';
    const bc=hf>.1?'#ffaaaa':enrCol;
    ctx.save();ctx.translate(wx(this.cx),wy(this.cy));ctx.scale(pop,pop);ctx.globalAlpha=da;
    // phase indicator ring
    const phaseColors=['#cc2200','#ff8800','#ff0066'];
    ctx.save();ctx.rotate(NOW*(this.enraged?2.5:.7));
    ctx.strokeStyle=phaseColors[this.phase-1];ctx.shadowColor=phaseColors[this.phase-1];ctx.shadowBlur=14;ctx.lineWidth=3;ctx.setLineDash([8,8]);
    ctx.beginPath();ctx.arc(0,0,44,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
    // aura
    ctx.save();ctx.globalAlpha=(.38+Math.sin(NOW*2)*.12+hf*.25)*da;ctx.shadowColor=bc;ctx.shadowBlur=42;ctx.fillStyle='rgba(0,0,0,0)';ctx.beginPath();ctx.arc(0,0,48,0,Math.PI*2);ctx.fill();ctx.restore();
    // shields
    if(this.shieldHp>0){
      for(let i=0;i<this.shieldHp;i++){
        const sa=this.shieldAng+i*(Math.PI*2/this.shieldMax);
        const sx=Math.cos(sa)*42,sy=Math.sin(sa)*42;
        ctx.save();ctx.translate(sx,sy);ctx.fillStyle='#44aaff';ctx.shadowColor='#44aaff';ctx.shadowBlur=16;
        ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.45;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-2,-2,2.8,0,Math.PI*2);ctx.fill();ctx.restore();
      }
    }
    // body
    ctx.save();ctx.rotate(this.angle);
    ctx.fillStyle=bc;ctx.shadowColor=bc;ctx.shadowBlur=20;
    ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3,r2=i%2?28:36;i===0?ctx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2):ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);}ctx.closePath();ctx.fill();
    ctx.fillStyle=hf>.1?'#ff8888':'#550000';ctx.shadowBlur=5;
    ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3,r2=i%2?16:22;i===0?ctx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2):ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);}ctx.closePath();ctx.fill();
    // phase 2+: extra spikes
    if(this.phase>=2){
      ctx.fillStyle=phaseColors[this.phase-1];ctx.shadowColor=phaseColors[this.phase-1];ctx.shadowBlur=10;
      for(let i=0;i<6;i++){const a=i*Math.PI/3+Math.PI/6;ctx.beginPath();ctx.moveTo(Math.cos(a)*22,Math.sin(a)*22);ctx.lineTo(Math.cos(a)*36,Math.sin(a)*36);ctx.lineTo(Math.cos(a+.2)*22,Math.sin(a+.2)*22);ctx.closePath();ctx.fill();}
    }
    ctx.fillStyle='#fff';ctx.shadowColor=this.enraged?'#ff8800':'#ff4400';ctx.shadowBlur=18;ctx.beginPath();ctx.ellipse(15,0,11,7,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#200';ctx.shadowBlur=0;ctx.beginPath();ctx.arc(20,0,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=this.enraged?'#ff4400':'#ff2200';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=9;ctx.beginPath();ctx.arc(22,0,2.8,0,Math.PI*2);ctx.fill();
    ctx.restore();ctx.restore();
    // boss HP bar at top
    for(const b of this.bullets)b.draw();
  }
}

class BossBullet{
  constructor(x,y,ang,floor){
    this.x=x;this.y=y;this.dead=false;
    const spd=clamp(180+floor*10,180,360);
    this.vx=Math.cos(ang)*spd;this.vy=Math.sin(ang)*spd;
    this.dmg=12+floor*3;
  }
  update(dt){
    const bd=btFrozen>0?.08:1;
    this.x+=this.vx*dt*bd;this.y+=this.vy*dt*bd;
    if(this.x<-30||this.x>WORLD_W+30||this.y<-30||this.y>WORLD_H+30||isSolidTile(this.x,this.y))this.dead=true;
    if(Math.random()<.4)pEmit(this.x,this.y,{n:1,spd:18,life:.11,sz:4,col:'#ff3300',glow:15,drag:.5});
  }
  draw(){
    ctx.save();ctx.shadowColor='#ff2200';ctx.shadowBlur=18;
    ctx.fillStyle='#ff4400';ctx.globalAlpha=.9;ctx.beginPath();ctx.arc(wx(this.x),wy(this.y),9,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.fillStyle='#ffcc88';ctx.beginPath();ctx.arc(wx(this.x),wy(this.y),4.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// XP ORB + GOLD COIN + WEAPON DROP + CHEST + HEALTH PACK
// ═══════════════════════════════════════════════
class XpOrb{
  constructor(x,y,val){
    this.x=x;this.y=y;this.vx=rnd(-55,55);this.vy=rnd(-75,-15);
    this.val=val;this.dead=false;this.t=0;
    this.col=val>=40?'#ff44ff':val>=20?'#44ffff':'#44ff88';
    this.r=val>=40?7:val>=20?5.5:4;
  }
  update(dt,player){
    this.t+=dt;
    if(this.t>60){this.dead=true;return;}
    if(this.t<0.9){
      this.vx*=.91;this.vy+=110*dt;this.vy*=.91;
      this.x+=this.vx*dt;this.y+=this.vy*dt;
    }
    const d=dist(this.x,this.y,player.cx,player.cy);
    const pullR=player.magnetRange||100;
    if(d<pullR){
      const a=angle(this.x,this.y,player.cx,player.cy);
      const pull=lerp(60,600,(pullR-d)/pullR);
      this.vx+=Math.cos(a)*pull*dt*8;this.vy+=Math.sin(a)*pull*dt*8;
      this.x+=this.vx*dt;this.y+=this.vy*dt;
    }
    if(d<15)this.dead=true;
  }
  draw(){
    if(this.dead)return;
    if(this.t>56&&Math.floor(this.t*6)%2===0)return;
    const pulse=1+Math.sin(this.t*6)*.12;
    ctx.save();ctx.translate(wx(this.x),wy(this.y));ctx.scale(pulse,pulse);
    ctx.shadowColor=this.col;ctx.shadowBlur=14;ctx.fillStyle=this.col;ctx.globalAlpha=.9;
    ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=.5;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-this.r*.3,-this.r*.3,this.r*.35,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

class GoldCoin{
  constructor(x,y,val){
    this.x=x;this.y=y;this.vx=rnd(-50,50);this.vy=rnd(-80,-10);
    this.val=val;this.dead=false;this.t=0;this.pickedUp=false;
  }
  update(dt,player){
    this.t+=dt;
    if(this.t>60){this.dead=true;return;}
    if(this.t<0.9){
      this.vx*=.88;this.vy+=120*dt;this.vy*=.88;
      this.x+=this.vx*dt;this.y+=this.vy*dt;
    }
    if(dist(this.x,this.y,player.cx,player.cy)<18){this.dead=true;this.pickedUp=true;}
  }
  draw(){
    if(this.dead)return;
    if(this.t>56&&Math.floor(this.t*6)%2===0)return;
    const bob=Math.sin(this.t*5)*.8;
    ctx.save();ctx.translate(wx(this.x),wy(this.y)+bob);
    ctx.shadowColor='#ffcc00';ctx.shadowBlur=10;
    ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffee88';ctx.beginPath();ctx.arc(-1.5,-1.5,2.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

class HealthPack{
  constructor(x,y){this.x=x;this.y=y;this.dead=false;this.t=0;this.heal=40;this.pickedUp=false;}
  update(dt,player){
    this.t+=dt;
    if(this.t>20){this.dead=true;return;} // expire — pickedUp stays false so no free heal
    if(dist(this.x,this.y,player.cx,player.cy)<20){this.dead=true;this.pickedUp=true;}
  }
  draw(){
    if(this.dead)return;
    // Blink in the last 4 seconds as a despawn warning — no alpha/shadow changes
    if(this.t>16&&Math.floor(this.t*6)%2===0)return;
    const bob=Math.sin(this.t*3)*3;
    ctx.save();ctx.translate(wx(this.x),wy(this.y)+bob);
    ctx.shadowColor='#ff4466';ctx.shadowBlur=16+Math.sin(this.t*3)*4;
    ctx.fillStyle='#cc1133';ctx.beginPath();ctx.roundRect(-10,-10,20,20,4);ctx.fill();
    ctx.fillStyle='#ff4466';ctx.fillRect(-7,-2,14,4);ctx.fillRect(-2,-7,4,14);
    ctx.restore();
  }
}

class WeaponDrop{
  constructor(x,y,key){this.x=x;this.y=y;this.key=key;this.w=WEAPONS[key];this.dead=false;this.t=0;}
  update(dt,player){
    this.t+=dt;
    if(this.t>20)this.dead=true;
    if(dist(this.x,this.y,player.cx,player.cy)<22)this.dead=true;
  }
  draw(){
    if(this.dead)return;
    // Blink in the last 4 seconds as a despawn warning
    if(this.t>16&&Math.floor(this.t*6)%2===0)return;
    const bob=Math.sin(this.t*3)*4;
    ctx.save();ctx.translate(wx(this.x),wy(this.y)+bob);
    ctx.shadowColor=this.w.glow;ctx.shadowBlur=18+Math.sin(this.t*4)*4;
    ctx.globalAlpha=.3+Math.sin(this.t*3)*.1;ctx.strokeStyle=this.w.col;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,19,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;ctx.fillStyle=this.w.col;ctx.shadowBlur=10;
    ctx.fillRect(-10,-3,20,6);ctx.fillRect(6,-5,8,10);
    ctx.font='bold 8px monospace';ctx.fillStyle='#fff';ctx.shadowBlur=4;
    ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(this.w.name,0,12);
    ctx.restore();
  }
}

// Chest: opens on E, drops loot
class Chest{
  constructor(x,y){this.x=x;this.y=y;this.dead=false;this.t=0;this.opened=false;this.openT=0;}
  update(dt,player){
    this.t+=dt;
    if(this.opened){this.openT+=dt;if(this.openT>.5)this.dead=true;return;}
    if(dist(this.x,this.y,player.cx,player.cy)<30&&ePressed){
      ePressed=false; // consume
      this.opened=true;
      // drop: weapon + gold + maybe health
      const wkeys=Object.keys(WEAPONS).filter(k=>k!=='pistol');
      G.drops.push(new WeaponDrop(this.x+rnd(-20,20),this.y-20,wkeys[Math.floor(Math.random()*wkeys.length)]));
      for(let i=0;i<4;i++)G.coins.push(new GoldCoin(this.x+rnd(-15,15),this.y+rnd(-10,5),rnd(8,18)|0));
      if(Math.random()<.5)G.healthpacks.push(new HealthPack(this.x+rnd(-20,20),this.y+rnd(-10,10)));
      pEmit(this.x,this.y,{n:20,spd:130,type:'spark',life:.5,sz:5,col:'#ffcc00',glow:22,drag:.82});
      spawnSW(this.x,this.y,'#ffcc00',60);
      spawnFloat(this.x,this.y-30,'CHEST!','#ffdd00',16,1.0);
    }
  }
  draw(){
    if(this.dead)return;
    const bob=this.opened?0:Math.sin(this.t*2)*.8;
    const scale=this.opened?lerp(1,2,this.openT/.5):1;
    const alpha=this.opened?lerp(1,0,this.openT/.5):1;
    ctx.save();ctx.translate(wx(this.x),wy(this.y)+bob);ctx.scale(scale,scale);ctx.globalAlpha=alpha;
    ctx.shadowColor='#ffcc00';ctx.shadowBlur=this.opened?30:16;
    ctx.fillStyle='#7a4e2d';ctx.beginPath();ctx.roundRect(-14,-10,28,20,3);ctx.fill();
    ctx.fillStyle='#a0662e';ctx.beginPath();ctx.roundRect(-14,-10,28,9,{upperLeft:3,upperRight:3});ctx.fill();
    ctx.fillStyle='#ffcc00';ctx.fillRect(-3,-3,6,6);ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#ffcc00';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(14,0);ctx.stroke();
    ctx.restore();
  }
}

// Shop NPC (appears in grace period)
class ShopNPC{
  constructor(x,y){this.x=x;this.y=y;this.t=0;this.active=false;}
  update(dt,player){
    this.t+=dt;
    if(dist(this.x,this.y,player.cx,player.cy)<35&&ePressed&&!G.shopOpen&&!G.shopLocked){
      G.shopOpen=true;G.paused=true;
      // Items are rolled once per floor (in initGame/nextFloor); don't re-roll here
      G.shopOpenTimer=0;
      ePressed=false;
    }
    // Show "CLOSED" label when locked
    this.locked=G.shopLocked;
  }
  draw(){
    const bob=Math.sin(this.t*2)*3;
    ctx.save();ctx.translate(wx(this.x),wy(this.y)+bob);
    ctx.shadowColor='#ffdd44';ctx.shadowBlur=18+Math.sin(this.t*3)*5;
    // robe
    ctx.fillStyle='#5533aa';ctx.beginPath();ctx.ellipse(0,8,10,14,0,0,Math.PI*2);ctx.fill();
    // head
    ctx.fillStyle='#ffcc99';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(0,-8,9,0,Math.PI*2);ctx.fill();
    // hat
    ctx.fillStyle='#ffdd44';ctx.shadowColor='#ffdd44';ctx.shadowBlur=10;
    ctx.beginPath();ctx.moveTo(-11,-8);ctx.lineTo(11,-8);ctx.lineTo(0,-28);ctx.closePath();ctx.fill();
    // eyes
    ctx.fillStyle='#442200';ctx.shadowBlur=0;ctx.beginPath();ctx.arc(-3,-8,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3,-8,1.5,0,Math.PI*2);ctx.fill();
    // "SHOP" label
    ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.textBaseline='bottom';
    if(this.locked){
      ctx.fillStyle='#884422';ctx.shadowColor='#aa3300';ctx.shadowBlur=6;ctx.fillText('CLOSED',0,-32);
    } else {
      ctx.fillStyle='#ffdd44';ctx.shadowColor='#ffaa00';ctx.shadowBlur=8;ctx.fillText('[E] SHOP',0,-32);
    }
    ctx.restore();
  }
}

function rollShop(){
  const pool=[...SHOP_ITEMS];
  const picks=[];const seen=new Set();
  while(picks.length<4&&pool.length){
    const i=Math.floor(Math.random()*pool.length);
    const item=pool.splice(i,1)[0];
    if(!seen.has(item.id)){picks.push(item);seen.add(item.id);}
  }
  return picks;
}

// Ghost ally (soul harvest)
class GhostAlly{
  constructor(x,y){this.x=x;this.y=y;this.angle=0;this.shootCd=0;this.life=15;this.dead=false;}
  update(dt,player,enemies){
    this.life-=dt;if(this.life<=0){this.dead=true;return;}
    this.x=lerp(this.x,player.cx+Math.cos(NOW*2)*68,dt*3);
    this.y=lerp(this.y,player.cy+Math.sin(NOW*2)*68,dt*3);
    let nearest=null,nd=Infinity;
    for(const e of enemies){if(!e.dead){const d=dist(this.x,this.y,e.cx,e.cy);if(d<nd){nd=d;nearest=e;}}}
    if(nearest&&nd<320){
      this.angle=Math.atan2(nearest.cy-this.y,nearest.cx-this.x);
      this.shootCd-=dt;
      if(this.shootCd<=0){this.shootCd=.42;G.bullets.push(new Bullet(this.x,this.y,this.angle,WEAPONS.laser,player.dmgMult*.6,0));}
    }
  }
  draw(){
    const a=Math.min(1,this.life*.4);
    ctx.save();ctx.globalAlpha=a*.8;ctx.translate(wx(this.x),wy(this.y));ctx.rotate(NOW*1.6);
    ctx.shadowColor='#cc44ff';ctx.shadowBlur=20;ctx.fillStyle='#cc44ff';
    ctx.beginPath();for(let i=0;i<6;i++){const ag=i*Math.PI/3;ctx.lineTo(Math.cos(ag)*11,Math.sin(ag)*11);}
    ctx.closePath();ctx.fill();ctx.fillStyle='#fff';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawBg(){
  const biome=TEX.biome||'forest';
  if(TEX.voidSrc){
    const PS=_PS;
    for(let fy=0;fy<H;fy+=PS){
      const rowH=Math.min(PS,H-fy);
      for(let fx=0;fx<W;fx+=PS){
        const colW=Math.min(PS,W-fx);
        ctx.drawImage(TEX.voidSrc,0,0,colW,rowH,fx,fy,colW,rowH);
      }
    }
  } else {
    ctx.fillStyle='#0c1608';ctx.fillRect(0,0,W,H);
  }
  // Radial vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,H*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.65)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  // Ambient glow
  const ac=biome==='volcanic'?`rgba(220,80,20,${.05+Math.sin(NOW*.35)*.015})`:

            `rgba(140,210,60,${.05+Math.sin(NOW*.35)*.015})`;

  pg.addColorStop(0,ac);pg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=pg;ctx.fillRect(0,0,W,H);
}

function drawObstacles(){

    const cx2=o.x+o.w/2,cy2=o.y+o.h/2;
    const rad=Math.min(o.w,o.h)*.28;
    ctx.shadowColor='rgba(0,0,0,0)';
    // Ground shadow first
    const sg=ctx.createLinearGradient(o.x,o.y+o.h,o.x,o.y+o.h+10);
    sg.addColorStop(0,'rgba(0,0,0,.4)');sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg;ctx.fillRect(o.x+3,o.y+o.h,o.w-3,10);
    if(biome==='volcanic'){
      // Scorched black basalt boulder
      const rg=ctx.createRadialGradient(cx2-o.w*.15,cy2-o.h*.2,2,cx2,cy2,Math.max(o.w,o.h)*.7);
      rg.addColorStop(0,'#4a3020');rg.addColorStop(.5,'#2a1a10');rg.addColorStop(1,'#160c06');
      ctx.fillStyle=rg;ctx.strokeStyle='#0e0804';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,rad);ctx.fill();ctx.stroke();
      // Lava crack glow seeping through
      ctx.strokeStyle='rgba(220,80,10,.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(o.x+o.w*.2,o.y+o.h*.3);ctx.lineTo(o.x+o.w*.6,o.y+o.h*.6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(o.x+o.w*.5,o.y+o.h*.2);ctx.lineTo(o.x+o.w*.8,o.y+o.h*.7);ctx.stroke();
      // Ash-grey highlight edge
      ctx.strokeStyle='rgba(140,110,80,.35)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(o.x+4,o.y+2);ctx.lineTo(o.x+o.w-4,o.y+2);ctx.stroke();
    } else if(biome==='rocky'){
      // Sandstone slab — warm tan
      const rg=ctx.createRadialGradient(cx2-o.w*.15,cy2-o.h*.2,2,cx2,cy2,Math.max(o.w,o.h)*.7);
      rg.addColorStop(0,'#c8a870');rg.addColorStop(.5,'#a88850');rg.addColorStop(1,'#7a6030');
      ctx.fillStyle=rg;ctx.strokeStyle='#604820';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,rad*.6);ctx.fill();ctx.stroke();
      // Horizontal strata lines
      ctx.strokeStyle='rgba(80,55,20,.3)';ctx.lineWidth=1;
      for(let i=1;i<3;i++){
        const sy=o.y+o.h*(i/3);
        ctx.beginPath();ctx.moveTo(o.x+4,sy);ctx.lineTo(o.x+o.w-4,sy);ctx.stroke();
      }
      // Sun highlight
      ctx.strokeStyle='rgba(230,210,160,.45)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(o.x+4,o.y+2);ctx.lineTo(o.x+o.w-4,o.y+2);ctx.stroke();
    } else {
      // Forest biome — mossy boulder
      const rg=ctx.createRadialGradient(cx2-o.w*.15,cy2-o.h*.2,2,cx2,cy2,Math.max(o.w,o.h)*.7);
      rg.addColorStop(0,'#6a7850');rg.addColorStop(.45,'#4e5c38');rg.addColorStop(1,'#2e3820');
      ctx.fillStyle=rg;ctx.strokeStyle='#1e2814';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,rad);ctx.fill();ctx.stroke();
      // Moss patches — darker green blobs on top surface
      ctx.fillStyle='rgba(40,70,20,.45)';
      ctx.beginPath();ctx.ellipse(cx2-o.w*.15,o.y+o.h*.25,o.w*.2,o.h*.15,.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx2+o.w*.15,o.y+o.h*.3,o.w*.15,o.h*.12,-.1,0,Math.PI*2);ctx.fill();
      // Sunlit top-left rim
      ctx.strokeStyle='rgba(160,190,100,.4)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(o.x+4,o.y+2);ctx.lineTo(o.x+o.w-4,o.y+2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(o.x+2,o.y+4);ctx.lineTo(o.x+2,o.y+o.h-4);ctx.stroke();
    }
  }
}

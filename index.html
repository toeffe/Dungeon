function drawMinimap(){
  if(!G.mapData)return;
  const m=G.mapData, T=m.TILE;
  const mmW=160,mmH=120,mmX=W-mmW-12,mmY=96; // top-right, below score/floor text
  const scX=mmW/WORLD_W, scY=mmH/WORLD_H;

  ctx.save();
  // Background
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(mmX-2,mmY-2,mmW+4,mmH+4,4);ctx.fill();ctx.stroke();

  // Draw explored tiles
  ctx.save();ctx.beginPath();ctx.rect(mmX,mmY,mmW,mmH);ctx.clip();
  const step=2;
  const pw=Math.max(1,T*scX*step),ph=Math.max(1,T*scY*step);
  for(let ty=0;ty<m.ROWS;ty+=step){
    for(let tx=0;tx<m.COLS;tx+=step){
      const tile=m.grid[ty*m.COLS+tx];
      if(tile===0)continue;
      // fog of war: only show if player has been nearby
      if(m.discovered&&!m.discovered[ty*m.COLS+tx])continue;
      const mx=mmX+tx*T*scX,my=mmY+ty*T*scY;
      if(tile===1)ctx.fillStyle='rgba(80,65,110,.85)';
      else if(tile===2)ctx.fillStyle='rgba(40,100,180,.85)';
      else if(tile===3)ctx.fillStyle='rgba(200,80,10,.85)';
      ctx.fillRect(mx,my,pw,ph);
    }
  }
  // Exit portal
  const ep=G.exitPortal;
  if(ep){
    const mx=mmX+ep.x*scX,my=mmY+ep.y*scY;
    ctx.fillStyle='#44ffaa';ctx.shadowColor='#44ffaa';ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(mx,my,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }
  // Enemies
  for(const e of G.enemies){
    if(e.dead)continue;
    const mx=mmX+e.cx*scX,my=mmY+e.cy*scY;
    ctx.fillStyle=e.elite?'#ffdd00':'#ff4444';
    ctx.beginPath();ctx.arc(mx,my,1.5,0,Math.PI*2);ctx.fill();
  }
  if(G.boss&&!G.boss.dead){
    const mx=mmX+G.boss.cx*scX,my=mmY+G.boss.cy*scY;
    ctx.fillStyle=`hsl(${NOW*120%360},100%,60%)`;ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=5;
    ctx.beginPath();ctx.arc(mx,my,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }
  // Chests
  for(const c of G.chests){
    if(c.dead)continue;
    const mx=mmX+c.x*scX,my=mmY+c.y*scY;
    ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(mx,my,2,0,Math.PI*2);ctx.fill();
  }
  // Player
  const px=mmX+G.player.cx*scX,py=mmY+G.player.cy*scY;
  ctx.fillStyle='#88ddff';ctx.shadowColor='#88ddff';ctx.shadowBlur=6;
  ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  // Viewport rect
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;
  ctx.strokeRect(mmX+CAM.x*scX,mmY+CAM.y*scY,W*scX,H*scY);
  ctx.restore();

  // Label
  ctx.font='8px monospace';ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillText('MAP',mmX+mmW,mmY-1);
  ctx.restore();
}

function drawExitPortalArrow(){
  // Screen-edge arrow pointing toward the exit portal when it's off-screen
  const ep=G.exitPortal;
  if(!ep||onScreenPt(ep.x,ep.y,80))return;
  const pulse=Math.sin(NOW*4)*.3+.7;
  // Direction from player world position to portal world position — camera-independent
  const a=Math.atan2(ep.y-G.player.cy, ep.x-G.player.cx);
  // Player's screen position
  const psx=wx(G.player.cx), psy=wy(G.player.cy);
  // Walk outward from the player's screen pos until we hit the screen edge
  const M2=36;
  const cos=Math.cos(a), sin=Math.sin(a);
  // Max steps to each edge from player screen pos
  const tRight =(W-M2-psx)/cos; const tLeft  =(M2-psx)/cos;
  const tBottom=(H-M2-psy)/sin; const tTop   =(M2-psy)/sin;
  const candidates=[tRight,tLeft,tBottom,tTop].filter(v=>v>0);
  const t=candidates.length?Math.min(...candidates):100;
  const ex=clamp(psx+cos*t, M2, W-M2);
  const ey=clamp(psy+sin*t, M2, H-M2);
  ctx.save();
  ctx.translate(ex,ey);ctx.rotate(a);
  ctx.globalAlpha=pulse*0.9;
  // Arrow body
  ctx.fillStyle='#44ffaa';ctx.shadowColor='#44ffaa';ctx.shadowBlur=14;
  ctx.beginPath();
  ctx.moveTo(16,0);ctx.lineTo(-8,-8);ctx.lineTo(-4,0);ctx.lineTo(-8,8);ctx.closePath();
  ctx.fill();
  // Distance label
  ctx.rotate(-a);
  const d=Math.round(Math.hypot(ep.x-G.player.cx,ep.y-G.player.cy));
  ctx.font='bold 8px monospace';ctx.fillStyle='#44ffaa';ctx.shadowBlur=6;
  ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(`EXIT ${d}`,0,14);
  ctx.restore();
}

function drawExitPortal(){
  const ep=G.exitPortal;
  if(!ep||!onScreenPt(ep.x,ep.y,80))return;
  const sx=wx(ep.x),sy=wy(ep.y);
  const spin=NOW*1.2, pulse=Math.sin(NOW*3)*.15+.85;
  ctx.save();ctx.translate(sx,sy);
  // Outer glow
  const grad=ctx.createRadialGradient(0,0,5,0,0,45);
  grad.addColorStop(0,'rgba(80,255,160,.35)');
  grad.addColorStop(.5,'rgba(40,200,120,.12)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,45,0,Math.PI*2);ctx.fill();
  // Spinning rings
  for(let r=0;r<3;r++){
    ctx.save();ctx.rotate(spin*(r%2?1:-1)+r*1.05);
    ctx.strokeStyle=`rgba(60,255,140,${.5-r*.1})`;ctx.shadowColor='#44ff88';ctx.shadowBlur=12;
    ctx.lineWidth=2-r*.3;ctx.setLineDash([6,4+r*3]);
    ctx.beginPath();ctx.arc(0,0,18+r*8,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }
  // Core
  ctx.scale(pulse,pulse);
  ctx.fillStyle='rgba(80,255,160,.8)';ctx.shadowColor='#44ff88';ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.shadowBlur=30;
  ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
  // Label
  ctx.scale(1/pulse,1/pulse);
  ctx.font='bold 9px monospace';ctx.fillStyle='rgba(100,255,160,.8)';ctx.shadowColor='#44ff88';ctx.shadowBlur=8;
  ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('[E] NEXT FLOOR',0,18);
  ctx.restore();
}

function drawHUD(){
  const p=G.player;
  // ── Left panel: stack from bottom up, fixed slots ──────────
  const LX=12, BW=220; // left x, bar width
  // Row positions (Y coordinate of element top or reference point)
  const ROW={
    xp:    H-12,   // xp bar bottom edge
    hp:    H-34,   // hp bar bottom edge (bar is 20px tall → occupies H-54..H-34)
    gold:  H-62,   // gold text (textBaseline bottom) — well clear of HP bar
    dash:  H-72,   // dash bar top
    pips:  H-88,   // overload/soul pips centre
    passiveIcons: H-14,
  };
  const bh=20;

  // HP bar — ROW.hp is the bottom edge; bar grows upward from there
  const hx=LX, hy=ROW.hp-bh, bw=BW;
  ctx.fillStyle='rgba(0,0,0,.72)';ctx.beginPath();ctx.roundRect(hx-3,hy-3,bw+6,bh+6,5);ctx.fill();
  const hf=clamp(p.hp/p.maxHp,0,1);
  const hc=hf>.5?'hsl(130,70%,48%)':hf>.25?'hsl(40,90%,50%)':'hsl(0,80%,50%)';
  ctx.fillStyle=hc;ctx.shadowColor=hc;ctx.shadowBlur=12;
  ctx.beginPath();ctx.roundRect(hx,hy,bw*hf,bh,3);ctx.fill();ctx.shadowBlur=0;
  ctx.font='bold 11px monospace';ctx.fillStyle='rgba(255,255,255,.85)';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText(`HP  ${Math.ceil(p.hp)} / ${p.maxHp}`,hx+5,hy+bh/2);
  // barrier pip inline with HP bar
  if(p.barrierMax){
    const ba=p.barrierHp>0?1:Math.max(0,(10-(p.barrierCd||0))/10);
    ctx.save();ctx.globalAlpha=.4+ba*.6;ctx.fillStyle=p.barrierHp>0?'#4488ff':'#1a2244';
    ctx.shadowColor='#4488ff';ctx.shadowBlur=p.barrierHp>0?12:0;
    ctx.beginPath();ctx.arc(hx+bw+12,hy+bh/2,7,0,Math.PI*2);ctx.fill();
    if(!p.barrierHp){ctx.strokeStyle='#4488ff';ctx.lineWidth=2;ctx.shadowBlur=5;ctx.beginPath();ctx.arc(hx+bw+12,hy+bh/2,7,-Math.PI/2,-Math.PI/2+Math.PI*2*ba);ctx.stroke();}
    ctx.restore();
  }

  // XP bar — sits just above the very bottom edge
  const xy=ROW.xp-7, xbh=7;
  ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(hx,xy,bw,xbh);
  const xg=ctx.createLinearGradient(hx,xy,hx+bw,xy);xg.addColorStop(0,'#44aaff');xg.addColorStop(1,'#aa44ff');
  ctx.fillStyle=xg;ctx.shadowColor='#8844ff';ctx.shadowBlur=7;ctx.fillRect(hx,xy,bw*clamp(p.xp/p.xpNext,0,1),xbh);ctx.shadowBlur=0;
  ctx.font='9px monospace';ctx.fillStyle='rgba(255,255,255,.48)';ctx.textBaseline='middle';
  ctx.fillText(`LV ${p.level}  ${p.xp}/${p.xpNext} XP`,hx+3,xy+xbh/2);

  // Gold + dash label on same line
  ctx.font='bold 11px monospace';ctx.fillStyle='#ffcc44';ctx.shadowColor='#ffaa00';ctx.shadowBlur=7;
  ctx.textBaseline='bottom';ctx.fillText(`⬡ ${p.gold}`,hx,ROW.gold);ctx.shadowBlur=0;

  // Dash bar
  const dcBase=p.dashCdBase||1.0;
  const dashY=ROW.dash;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(hx,dashY,bw,4);
  if(p.dashCd>0){
    ctx.fillStyle='#3355aa';ctx.fillRect(hx,dashY,bw*(1-p.dashCd/dcBase),4);
    ctx.font='8px monospace';ctx.fillStyle='rgba(100,130,255,.55)';ctx.textBaseline='bottom';
    ctx.fillText(`DASH ${p.dashCd.toFixed(1)}s`,hx+bw+6,dashY+5);
  } else {
    ctx.fillStyle='#4466ee';ctx.shadowColor='#4466ff';ctx.shadowBlur=5;ctx.fillRect(hx,dashY,bw,4);ctx.shadowBlur=0;
    ctx.font='8px monospace';ctx.fillStyle='rgba(100,210,255,.85)';ctx.textBaseline='bottom';ctx.shadowColor='#44aaff';ctx.shadowBlur=4;
    ctx.fillText('DASH READY',hx+bw+6,dashY+5);ctx.shadowBlur=0;
  }

  // Overload pips (only if active)
  let pipRow=ROW.pips;
  if(p.overload){
    for(let i=0;i<8;i++){
      ctx.fillStyle=i<(p.shotsFired%8)?'#ffffff':'#1e1e1e';ctx.shadowColor='#ffffff';ctx.shadowBlur=i<(p.shotsFired%8)?7:0;
      ctx.beginPath();ctx.arc(hx+8+i*13,pipRow,3.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    }
    ctx.font='8px monospace';ctx.fillStyle='rgba(255,255,255,.3)';ctx.textBaseline='middle';
    ctx.fillText('OVL',hx+8*13+14,pipRow);
    pipRow-=14;
  }
  // Soul harvest pips
  if(p.soulHarvest){
    for(let i=0;i<5;i++){
      ctx.fillStyle=i<(p.soulKillBuf||0)?'#cc44ff':'#1a0a22';ctx.shadowColor='#cc44ff';ctx.shadowBlur=i<(p.soulKillBuf||0)?7:0;
      ctx.beginPath();ctx.arc(hx+8+i*13,pipRow,3.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    }
    ctx.font='8px monospace';ctx.fillStyle='rgba(200,100,255,.3)';ctx.textBaseline='middle';
    ctx.fillText('SOUL',hx+5*13+14,pipRow);
    pipRow-=14;
  }

  // ── Level-up pending badge (flashing, above pips) ──────────
  if(G.levelUpPending){
    const ba=Math.sin(NOW*6)*.5+.5;
    ctx.save();ctx.globalAlpha=.7+ba*.3;
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.beginPath();ctx.roundRect(hx,pipRow-22,bw,20,5);ctx.fill();
    ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#ffff44';ctx.shadowColor='#ffcc00';ctx.shadowBlur=12+ba*8;
    ctx.fillText('⬆ LEVEL UP READY — TAB',hx+bw/2,pipRow-12);
    ctx.restore();
    // touch target: tap the badge to open
    if(M.clicked&&M.y>pipRow-24&&M.y<pipRow&&M.x>hx&&M.x<hx+bw){
      G.levelUpChoices=rollLevelUp();G.levelUpPending=false;G.paused=true;M.clicked=false;
    }
  }

  // ── Right panel ──────────────────────────────────────────────

  if(p.burnRounds)pass.push({i:'🔥',c:'#ff6600'});if(p.poisonRounds)pass.push({i:'☣',c:'#44ff44'});
  if(p.freezeRounds)pass.push({i:'❄',c:'#88ddff'});if(p.vampPerKill)pass.push({i:'🩸',c:'#dd2255'});

  }

  // ── Top indicators ─────────────────────────────────────────

    ctx.fillStyle='rgba(0,0,0,.75)';ctx.beginPath();ctx.roundRect(bx2-3,by2-3,bw2+6,bh2+6,5);ctx.fill();

    ctx.save();ctx.globalAlpha=.12;ctx.fillStyle='rgba(80,150,255,.12)';ctx.fillRect(0,0,W,H);

    ctx.shadowColor=hover&&canBuy?it.col:'transparent';ctx.shadowBlur=hover?22:0;

    ctx.textAlign='center';ctx.textBaseline='middle';

    for(const w of lines){const t=line+w+' ';if(ctx.measureText(t).width>cw-20&&line!==''){ctx.fillText(line.trim(),cx2+cw/2,ly);line=w+' ';ly+=16;}else line=t;}
    ctx.fillText(line.trim(),cx2+cw/2,ly);

let luHover=-1;
function wrapText(t,maxW){const ws=t.split(' ');const ls=[];let line='';for(const w of ws){const tt=line+w+' ';if(ctx.measureText(tt).width>maxW&&line!==''){ls.push(line.trim());line=w+' ';}else line=tt;}if(line.trim())ls.push(line.trim());return ls;}

    const catC={off:'#ff5566',def:'#44ff88',utl:'#44aaff'}[u.cat];const catL={off:'OFFENSE',def:'DEFENSE',utl:'UTILITY'}[u.cat];

// WORLD / CAMERA (constants)
// ═══════════════════════════════════════════════
const WORLD_W=2400, WORLD_H=1800;
const CAM={x:0,y:0,tx:0,ty:0};

// ═══════════════════════════════════════════════
// AMBIENT DUST
// ═══════════════════════════════════════════════
let ambientDusts=[];
function initAmbientDust(){
  ambientDusts=[];
  for(let i=0;i<60;i++){
    ambientDusts.push({
      x:Math.random()*WORLD_W, y:Math.random()*WORLD_H,
      vx:rnd(-.4,.4)*8, vy:rnd(-1.2,-.2)*8,
      life:Math.random(), maxLife:rnd(3,8),
      sz:rnd(.8,2.2), a:rnd(.06,.2)
    });
  }
}
function tickAmbientDust(dt){
  for(const d of ambientDusts){
    d.x+=d.vx*dt; d.y+=d.vy*dt; d.life-=dt;
    if(d.life<=0){
      d.x=CAM.x+Math.random()*W; d.y=CAM.y+H+10;
      d.life=d.maxLife; d.vx=rnd(-.4,.4)*8; d.vy=rnd(-1.2,-.2)*8;
    }
    if(!onScreenPt(d.x,d.y,10))continue;
    const a=d.a*Math.min(1,d.life,.5)*2;
    const dustCol=(TEX.biome==='volcanic')?'#cc6622':(TEX.biome==='tundra')?'#aaccee':(TEX.biome==='swamp')?'#44aa44':(TEX.biome==='rocky')?'#c8a860':'#88bb44';
    ctx.globalAlpha=a; ctx.fillStyle=dustCol;
    ctx.beginPath(); ctx.arc(d.x,d.y,d.sz,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════
// WORLD / CAMERA
// ═══════════════════════════════════════════════

// World-to-screen helpers (render already applies -CAM translate, so these are identity)
const wx=x=>x;
const wy=y=>y;

function onScreenPt(x,y,pad){
  return x+pad>CAM.x&&x-pad<CAM.x+W&&y+pad>CAM.y&&y-pad<CAM.y+H;
}

function camUpdate(dt,cx,cy){
  CAM.tx=clamp(cx-W/2,0,WORLD_W-W);
  CAM.ty=clamp(cy-H/2,0,WORLD_H-H);
  CAM.x=lerp(CAM.x,CAM.tx,Math.min(1,dt*8));
  CAM.y=lerp(CAM.y,CAM.ty,Math.min(1,dt*8));
}

// Draw individual tree objects stored in mapData.trees
function drawTrees(trees){
  if(!trees||!trees.length)return;
  // Sort back-to-front by Y so overlapping trees look correct
  const vis=trees.filter(t=>onScreenPt(t.x,t.y,t.r*2+20));
  vis.sort((a,b)=>a.y-b.y);
  for(const t of vis){
    const sx=t.x,sy=t.y,r=t.r,lean=t.lean;
    const cx=wx(sx),cy=wy(sy); // world-to-screen (identity after camera translate)

    // ── Ground shadow (soft ellipse under the tree) ──
    ctx.save();
    ctx.globalAlpha=.35;
    const sg=ctx.createRadialGradient(cx+lean*r,cy+r*.3,0,cx+lean*r,cy+r*.3,r*1.1);
    sg.addColorStop(0,'rgba(0,0,0,.5)');sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(cx+lean*r,cy+r*.35,r*.9,r*.4,0,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // ── Trunk ────────────────────────────────────────
    const trunkW=r*.18,trunkH=r*.9;
    const trunkG=ctx.createLinearGradient(cx-trunkW,cy,cx+trunkW,cy);
    trunkG.addColorStop(0,'#1e1008');trunkG.addColorStop(.35,'#3a2010');trunkG.addColorStop(.6,'#2e1808');trunkG.addColorStop(1,'#1a0e06');
    ctx.fillStyle=trunkG;
    ctx.beginPath();
    ctx.moveTo(cx-trunkW*.6,cy+4);
    ctx.bezierCurveTo(cx-trunkW,cy-trunkH*.3,cx-trunkW*.5+lean*r*.4,cy-trunkH*.75,cx+lean*r*.5,cy-trunkH);
    ctx.bezierCurveTo(cx+trunkW*.5+lean*r*.4,cy-trunkH*.75,cx+trunkW,cy-trunkH*.3,cx+trunkW*.6,cy+4);
    ctx.closePath();ctx.fill();

    // ── Canopy — 3 layers: back shadow, main body, highlight ─────────────────
    const baseHue=t.hue,lum=t.dark===1?25:t.dark===2?42:33;
    const canopyY=cy-trunkH-r*.15;
    const canopyCX=cx+lean*r;

    // Back shadow layer (slightly below and larger)
    ctx.fillStyle=`hsl(${baseHue},55%,${lum-10}%)`;
    ctx.beginPath();ctx.ellipse(canopyCX+r*.08,canopyY+r*.12,r*.88,r*.82,.05,0,Math.PI*2);ctx.fill();

    // Main canopy — irregular blob using multiple overlapping ellipses
    const mainG=ctx.createRadialGradient(canopyCX-r*.2,canopyY-r*.2,r*.1,canopyCX,canopyY,r);
    mainG.addColorStop(0,`hsl(${baseHue},60%,${lum+6}%)`);
    mainG.addColorStop(.55,`hsl(${baseHue},58%,${lum}%)`);
    mainG.addColorStop(1,`hsl(${baseHue},52%,${lum-8}%)`);
    ctx.fillStyle=mainG;
    // Main ellipse
    ctx.beginPath();ctx.ellipse(canopyCX,canopyY,r*.82,r*.78,lean*.2,0,Math.PI*2);ctx.fill();
    // Bumpy edge lobes — gives organic silhouette instead of perfect circle
    const lobeCount=5+Math.floor(t.r/6);
    for(let i=0;i<lobeCount;i++){
      const la=(i/lobeCount)*Math.PI*2+lean*.3;
      const lr=r*(.62+_hash(i,0,t.x|0)*.22),lbr=r*(.22+_hash(i,1,t.y|0)*.12);
      const lx=canopyCX+Math.cos(la)*lr,ly=canopyY+Math.sin(la)*lr*.88;
      ctx.fillStyle=`hsl(${baseHue+Math.floor(_hash(i,2,t.r|0)*8)-4},57%,${lum+(_hash(i,3,lobeCount)*6|0)-3}%)`;
      ctx.beginPath();ctx.ellipse(lx,ly,lbr,lbr*.85,la*.3,0,Math.PI*2);ctx.fill();
    }

    // Sunlit highlight — top-left bright arc
    const hlG=ctx.createRadialGradient(canopyCX-r*.3,canopyY-r*.35,0,canopyCX-r*.3,canopyY-r*.35,r*.65);
    hlG.addColorStop(0,`hsla(${baseHue+10},70%,${lum+22}%,.55)`);
    hlG.addColorStop(.4,`hsla(${baseHue+5},65%,${lum+12}%,.2)`);
    hlG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=hlG;ctx.beginPath();ctx.ellipse(canopyCX,canopyY,r*.8,r*.75,lean*.2,0,Math.PI*2);ctx.fill();

    // Rim stroke — very thin darker outline for definition
    ctx.strokeStyle=`hsla(${baseHue-5},50%,${lum-12}%,.6)`;ctx.lineWidth=.8;
    ctx.beginPath();ctx.ellipse(canopyCX,canopyY,r*.82,r*.78,lean*.2,0,Math.PI*2);ctx.stroke();
  }
}

// Tile values: 0=wall/void, 1=floor, 2=water, 3=lava
function drawWorld(){
  if(!G||!G.mapData){drawBg();drawObstacles();return;}
  const m=G.mapData,T=m.TILE;
  const tx0=Math.max(0,Math.floor(CAM.x/T)-1),ty0=Math.max(0,Math.floor(CAM.y/T)-1);
  const tx1=Math.min(m.COLS,Math.ceil((CAM.x+W)/T)+1);
  const ty1=Math.min(m.ROWS,Math.ceil((CAM.y+H)/T)+1);
  const biome=TEX.biome||'forest';
  const PS=_PS; // pattern source size

  function isSolid(ttx,tty){
    if(ttx<0||tty<0||ttx>=m.COLS||tty>=m.ROWS)return true;
    return m.grid[tty*m.COLS+ttx]===0;
  }

  // ── Helper: drawImage-based seamless tile fill ─────────────────────────────
  // Samples from a PS×PS source canvas at the correct world-aligned offset.
  // This completely avoids createPattern and its transform issues.
  // drawSeamless: tiles src (PS×PS offscreen canvas) across a world-space rect.
  // Works correctly even when w or h > PS (multi-tile fills like the full viewport).
  function drawSeamless(src,px,py,w,h){
    const sx0=(px%PS+PS)%PS, sy0=(py%PS+PS)%PS;
    let fy=0;
    while(fy<h){
      const sy=((py+fy)%PS+PS)%PS;
      const rowH=Math.min(PS-sy,h-fy);
      let fx=0;
      while(fx<w){
        const sx=((px+fx)%PS+PS)%PS;
        const colW=Math.min(PS-sx,w-fx);
        ctx.drawImage(src,sx,sy,colW,rowH,px+fx,py+fy,colW,rowH);
        fx+=colW;
      }
      fy+=rowH;
    }
  }

  const wf=Math.floor(NOW*2)%2;

  // 1. Full-viewport void
  drawSeamless(TEX.voidSrc,CAM.x,CAM.y,W,H);

  // 2. Clip to floor tiles and fill ground texture
  ctx.save();
  ctx.beginPath();
  for(let ty=ty0;ty<ty1;ty++){
    for(let tx=tx0;tx<tx1;tx++){
      if(m.grid[ty*m.COLS+tx]===1)ctx.rect(tx*T,ty*T,T,T);
    }
  }
  ctx.clip();
  drawSeamless(TEX.groundSrc,CAM.x,CAM.y,W,H);
  ctx.restore();

  // 3. Water/lava tiles
  for(let ty=ty0;ty<ty1;ty++){
    for(let tx=tx0;tx<tx1;tx++){
      const tile=m.grid[ty*m.COLS+tx];
      if(tile===2||tile===3)ctx.drawImage(TEX.water[wf],tx*T,ty*T,T,T);
    }
  }

  // ── Edge darkening: per-boundary-tile radial gradient darkening ───────────
  // For every floor tile that borders at least one void tile, draw a small
  // radial gradient darkening spot on the void-facing edge(s).  This replaces
  // the shadowBlur approach (which left square halos) with smooth per-edge
  // gradients that feather softly into the ground — no hard edges, no halos.
  const edgeDark=biome==='volcanic'?'rgba(8,2,0,':biome==='tundra'?'rgba(0,2,8,':biome==='rocky'?'rgba(2,2,0,':biome==='swamp'?'rgba(0,6,0,':'rgba(0,4,0,';
  const edgeR=T*1.5; // how far the darkening fades into the floor
  for(let ty=ty0-1;ty<ty1+1;ty++){
    for(let tx=tx0-1;tx<tx1+1;tx++){
      if(m.grid[ty*m.COLS+tx]!==1)continue;
      const wx=tx*T, wy=ty*T;
      // Check each of the 4 cardinal neighbours; if void, paint a gradient from that edge in
      const neighbours=[
        [tx,ty-1, wx+T/2,wy,       wx+T/2,wy+edgeR],   // top void → darken downward
        [tx,ty+1, wx+T/2,wy+T,     wx+T/2,wy+T-edgeR],  // bottom void → darken upward
        [tx-1,ty, wx,    wy+T/2,   wx+edgeR,wy+T/2],    // left void → darken rightward
        [tx+1,ty, wx+T,  wy+T/2,   wx+T-edgeR,wy+T/2],  // right void → darken leftward
      ];
      for(const[ntx,nty,gx0,gy0,gx1,gy1] of neighbours){
        const inBounds=ntx>=0&&nty>=0&&ntx<m.COLS&&nty<m.ROWS;
        const isVoid=!inBounds||m.grid[nty*m.COLS+ntx]===0;
        if(!isVoid)continue;
        const grd=ctx.createLinearGradient(gx0,gy0,gx1,gy1);
        grd.addColorStop(0,edgeDark+'0.72)');
        grd.addColorStop(0.5,edgeDark+'0.28)');
        grd.addColorStop(1,edgeDark+'0)');
        ctx.fillStyle=grd;
        ctx.fillRect(wx,wy,T,T);
      }
    }
  }

  // ── 4. Trees ──────────────────────────────────────────────────────────────
  drawTrees(m.trees);

  // ── 5. Soft vignette ──────────────────────────────────────────────────────
  const vg=ctx.createRadialGradient(CAM.x+W/2,CAM.y+H/2,H*.32,CAM.x+W/2,CAM.y+H/2,H*.88);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=vg;ctx.fillRect(CAM.x,CAM.y,W,H);

  drawObstacles();
}

// ═══════════════════════════════════════════════
// MAP GENERATOR  — open world terrain
// ═══════════════════════════════════════════════
function generateMap(floor, seed){
  let s=seed^0xdeadbeef;
  function rand(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;}
  function ri(a,b){return Math.floor(rand()*(b-a+1))+a;}

  const TILE=40;
  const COLS=Math.floor(WORLD_W/TILE); // 60
  const ROWS=Math.floor(WORLD_H/TILE); // 45
  // Start with entire map walkable
  const grid=new Uint8Array(COLS*ROWS).fill(1);

  // ── helper: carve an organic blob of void (impassable terrain) ──────────────
  // Uses a drunk-walk to grow from a seed tile into a ragged blob shape
  function carveBlob(cx,cy,size){
    const visited=new Set();
    let tx=cx,ty=cy;
    for(let i=0;i<size;i++){
      const key=ty*COLS+tx;
      if(!visited.has(key)){visited.add(key);grid[key]=0;}
      const dir=ri(0,3);
      if(dir===0)tx=clamp(tx+1,1,COLS-2);
      else if(dir===1)tx=clamp(tx-1,1,COLS-2);
      else if(dir===2)ty=clamp(ty+1,1,ROWS-2);
      else ty=clamp(ty-1,1,ROWS-2);
    }
  }

  // ── helper: carve a filled ellipse of void ────────────────────────────────
  function carveEllipse(cx,cy,rx,ry){
    for(let ty=cy-ry;ty<=cy+ry;ty++){
      for(let tx=cx-rx;tx<=cx+rx;tx++){
        if(tx<1||ty<1||tx>=COLS-1||ty>=ROWS-1)continue;
        const dx=(tx-cx)/rx,dy=(ty-cy)/ry;
        if(dx*dx+dy*dy<=1)grid[ty*COLS+tx]=0;
      }
    }
  }

  // ── helper: clear a circular safe zone (always walkable) ─────────────────
  function clearCircle(cx,cy,r){
    for(let ty=cy-r;ty<=cy+r;ty++){
      for(let tx=cx-r;tx<=cx+r;tx++){
        if(tx<0||ty<0||tx>=COLS||ty>=ROWS)continue;
        if((tx-cx)*(tx-cx)+(ty-cy)*(ty-cy)<=r*r)grid[ty*COLS+tx]=1;
      }
    }
  }

  const biome=getBiome(floor);

  // ── TREE / TERRAIN CLUSTERS ───────────────────────────────────────────────
  const numClusters=28+floor*3;
  for(let i=0;i<numClusters;i++){
    const cx=ri(3,COLS-4),cy=ri(3,ROWS-4);
    if(biome==='forest'){
      carveBlob(cx,cy,ri(18,40));
      if(rand()<.4)carveBlob(cx+ri(-4,4),cy+ri(-4,4),ri(10,22));
    } else if(biome==='swamp'){
      // Swamp: dense irregular blobs — narrow winding paths
      carveBlob(cx,cy,ri(22,45));
      if(rand()<.55)carveBlob(cx+ri(-5,5),cy+ri(-5,5),ri(12,25));
    } else if(biome==='rocky'){
      carveEllipse(cx,cy,ri(2,4),ri(2,3));
      if(rand()<.5)carveEllipse(cx+ri(-3,3),cy+ri(-3,3),ri(1,3),ri(1,2));
    } else if(biome==='tundra'){
      // Tundra: large open areas with sparse angular rock ridges
      carveEllipse(cx,cy,ri(3,6),ri(2,4));
      if(rand()<.3)carveEllipse(cx+ri(-4,4),cy+ri(-4,4),ri(2,4),ri(1,3));
    } else {
      carveBlob(cx,cy,ri(14,30));
      if(rand()<.35)carveBlob(cx+ri(-5,5),cy+ri(-5,5),ri(8,18));
    }
  }

  // ── WATER / LAVA / ICE PATCHES ───────────────────────────────────────────
  // tile 2 = water/swamp; tile 3 = lava/toxic/ice (does damage to player)
  const liquidTile = (biome==='volcanic'||biome==='tundra') ? 3 : 2;
  const numPools=4+ri(0,3)+(biome==='swamp'?3:0); // swamp gets extra pools
  for(let i=0;i<numPools;i++){
    const cx=ri(4,COLS-5),cy=ri(4,ROWS-5);
    const rx=ri(2,4),ry=ri(2,3);
    for(let ty=cy-ry;ty<=cy+ry;ty++){
      for(let tx=cx-rx;tx<=cx+rx;tx++){
        if(tx<1||ty<1||tx>=COLS-1||ty>=ROWS-1)continue;
        const dx=(tx-cx)/rx,dy=(ty-cy)/ry;
        if(dx*dx+dy*dy<=1)grid[ty*COLS+tx]=liquidTile;
      }
    }
  }

  // ── SPAWN & EXIT POINTS ───────────────────────────────────────────────────
  // Place them far from each other and clear a generous open area around each
  const spawnTX=ri(4,12),spawnTY=ri(4,12);
  const exitTX=ri(COLS-13,COLS-5),exitTY=ri(ROWS-13,ROWS-5);
  clearCircle(spawnTX,spawnTY,7);
  clearCircle(exitTX,exitTY,6);

  // Also clear a few open "clearings" scattered across the map
  const numClearings=5+floor;
  for(let i=0;i<numClearings;i++){
    clearCircle(ri(8,COLS-8),ri(8,ROWS-8),ri(3,6));
  }

  // ── OBSTACLE ROCKS (visible decoration + movement blocker) ───────────────
  const walls=[];
  const numRocks=12+floor*2;
  for(let i=0;i<numRocks;i++){
    const tx=ri(2,COLS-3),ty=ri(2,ROWS-3);
    if(grid[ty*COLS+tx]!==1)continue; // only on walkable ground
    const ps=TILE;
    walls.push({x:tx*TILE,y:ty*TILE,w:ps,h:ps});
    grid[ty*COLS+tx]=0;
  }

  // ── FAKE "rooms" array: just clearings for spawning/chest placement ───────
  const rooms=[];
  for(let i=0;i<numClearings+2;i++){
    const tx=ri(5,COLS-6),ty=ri(5,ROWS-6);
    if(grid[ty*COLS+tx]===1)rooms.push({x:tx,y:ty,w:4,h:4,cx:tx*TILE,cy:ty*TILE});
  }
  if(!rooms.length)rooms.push({x:spawnTX,y:spawnTY,w:4,h:4,cx:spawnTX*TILE,cy:spawnTY*TILE});

  const spawnRoom={cx:spawnTX*TILE,cy:spawnTY*TILE};
  const exitRoom={cx:exitTX*TILE,cy:exitTY*TILE};

  // ── CELLULAR AUTOMATA SMOOTHING ───────────────────────────────────────────
  // Rounds jagged 90° tile corners into organic blobs. 4 passes of birth/death:
  //   floor tile with ≤2 floor neighbours → dies (removes spurs/spikes)
  //   void tile with ≥6 floor neighbours → fills (closes narrow gaps)
  // Liquid tiles are preserved. Tree placement happens after so trees only
  // appear on tiles that are actually void in the final smoothed grid.
  for(let pass=0;pass<4;pass++){
    const next=new Uint8Array(grid);
    for(let ty=1;ty<ROWS-1;ty++){
      for(let tx=1;tx<COLS-1;tx++){
        const cur=grid[ty*COLS+tx];
        if(cur===2||cur===3)continue;
        let floorN=0;
        for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
          if(dx===0&&dy===0)continue;
          const v=grid[(ty+dy)*COLS+(tx+dx)];
          if(v===1||v===2||v===3)floorN++;
        }
        if(cur===1&&floorN<=2)next[ty*COLS+tx]=0;
        else if(cur===0&&floorN>=6)next[ty*COLS+tx]=1;
      }
    }
    grid.set(next);
  }
  // Re-clear spawn & exit after smoothing so they're always open
  clearCircle(spawnTX,spawnTY,6);
  clearCircle(exitTX,exitTY,5);

  // ── TREE OBJECTS: placed after CA so trees match the final smoothed grid ──
  const trees=[];
  if(biome==='forest'){
    for(let ty=1;ty<ROWS-1;ty++){
      for(let tx=1;tx<COLS-1;tx++){
        if(grid[ty*COLS+tx]!==0)continue;
        const near=grid[(ty-1)*COLS+tx]===1||grid[(ty+1)*COLS+tx]===1||grid[ty*COLS+tx-1]===1||grid[ty*COLS+tx+1]===1;
        const prob=near?0.55:0.28;
        if(rand()>prob)continue;
        const wx2=tx*TILE+rand()*TILE,wy2=ty*TILE+rand()*TILE;
        const treeR=12+rand()*14;
        const lean=(rand()-.5)*.4;
        const hue=100+Math.floor(rand()*30);
        const dark=Math.floor(rand()*3);
        trees.push({x:wx2,y:wy2,r:treeR,lean,hue,dark,type:'tree'});
      }
    }
  }

  return{grid,TILE,COLS,ROWS,walls,rooms,spawnRoom,exitRoom,trees,biome};
}

// GAME STATE + INIT
// ═══════════════════════════════════════════════
let G,combo=0,comboTimer=0;

function initGame(){
  particles.length=0;shockwaves.length=0;floats.length=0;
  trauma=0;FL.a=0;btFrozen=0;restartHold=0;
  waveMsg=null;combo=0;comboTimer=0;upgradeStacks={};
  const floor=1;
  const mapData=generateMap(floor, Date.now()&0xffff);
  obstacles=mapData.walls;
  const spawn=mapData.spawnRoom;
  initAmbientDust();
  G={
    player:new Player(),
    mapData,
    exitPortal:null, // set when boss dies
    enemies:[],bullets:[],orbs:[],coins:[],drops:[],chests:[],healthpacks:[],ghosts:[],
    shopNPC:null,shopOpen:false,shopItems:rollShop(),shopOpenTimer:0,shopLocked:false,
    boss:null,bossSpawned:false,floorClearing:false,
    score:0,kills:0,floor,wave:0,
    gameOver:false,paused:false,
    levelUpChoices:null,levelUpPending:false,
    spawnT:1.0,spawnInterval:2.2,maxEnemies:6,
    wavePool:0,waveSpawned:0,waveKilled:0,
    graceTimer:0.5,inGrace:true,
    slowFields:[],
  };
  // Spawn player in first room centre
  G.player.x=spawn.cx-14; G.player.y=spawn.cy-14;
  CAM.x=clamp(spawn.cx-W/2,0,WORLD_W-W);
  CAM.y=clamp(spawn.cy-H/2,0,WORLD_H-H);
  CAM.tx=CAM.x; CAM.ty=CAM.y;
  // Place starting chests + shop near spawn
  G.chests.push(new Chest(spawn.cx+80, spawn.cy));
  G.shopNPC=new ShopNPC(spawn.cx-80, spawn.cy);
  showWaveMsg('FLOOR 1 · WAVE 1');
}

function nextFloor(){
  G.floor++;G.wave=1;G.inGrace=false;G.graceTimer=0;
  buildTextures(G.floor);
  const mapData=generateMap(G.floor, (Date.now()&0xffff)^(G.floor*0x1234));
  G.mapData=mapData;
  obstacles=mapData.walls;
  G.spawnInterval=Math.max(.5,2.0-G.floor*.12);
  G.maxEnemies=Math.min(10,4+G.floor);
  G.bossSpawned=false;G.floorClearing=false;
  G.exitPortal=null;G.wave=0;
  G.wavePool=0;G.waveSpawned=0;G.waveKilled=0;
  G.inGrace=true;G.graceTimer=2.5;
  G.shopLocked=false;G.shopItems=rollShop(); // fresh set of items, locked once waves start
  G.chests=[];G.drops=[];G.orbs=[];G.coins=[];G.healthpacks=[];G.enemies=[];G.bullets=[];
  const spawn=mapData.spawnRoom;
  G.player.x=spawn.cx-14; G.player.y=spawn.cy-14;
  G.player.hp=Math.min(G.player.maxHp, G.player.hp+40); // small heal on floor change
  CAM.x=clamp(spawn.cx-W/2,0,WORLD_W-W);CAM.y=clamp(spawn.cy-H/2,0,WORLD_H-H);
  CAM.tx=CAM.x;CAM.ty=CAM.y;
  // Scatter chests near rooms
  for(let i=0;i<2+Math.floor(Math.random()*2);i++){
    const rm=mapData.rooms[Math.floor(Math.random()*mapData.rooms.length)];
    if(rm)G.chests.push(new Chest(rm.cx+rnd(-40,40),rm.cy+rnd(-40,40)));
  }
  // Shop near spawn
  G.shopNPC=new ShopNPC(spawn.cx+80,spawn.cy-30);
  initAmbientDust();
  showWaveMsg(`FLOOR ${G.floor} · WAVE ${G.wave}`);
  shake(.15);flash(100,150,255,.2);
}

// COMBAT HELPERS
// ═══════════════════════════════════════════════
function addKill(xpVal,goldVal){
  combo++;const comboWin=G.player.comboWindow||2.5;comboTimer=comboWin;
  const mult=1+(combo-1)*.12;
  const xp=Math.round(xpVal*(G.player.xpMult||1)*mult);
  if(G.player.gainXp(xp)){
    G.levelUpPending=true; // flag — player opens it manually with TAB or touching badge
    spawnFloat(G.player.cx,G.player.cy-28,'LEVEL UP! [TAB]','#ffff44',16,2.2);
    shake(.12);
  }
  const gold=Math.round(goldVal*(G.player.goldMult||1)*mult);
  G.player.gainGold(gold);
  G.score+=Math.round(G.floor*10*mult);G.kills++;
  if(combo>=5)spawnFloat(G.player.cx,G.player.cy-14,`${combo}× COMBO`,`hsl(${combo*20},100%,60%)`,14,.75);
}

function resolveHit(bullet,enemy){
  // status effects from bullet
  if(bullet.burnRounds)applyStatus(enemy,'burning',4,8);
  if(bullet.poisonRounds)applyStatus(enemy,'poisoned',5,4);
  if(bullet.freezeRounds&&Math.random()<.2)applyStatus(enemy,'frozen',1.5);
  enemy.hurt(bullet.dmg);enemy.wobble=1;
  if(bullet.reaper&&!enemy.dead)enemy.reaperMark=true;
  const hitColor=bullet.crit?'#ff44aa':bullet.mega?'#ffffff':bullet.weapon.col;
  pEmit(bullet.x,bullet.y,{n:bullet.mega?12:bullet.crit?10:6,spd:bullet.mega?220:150,type:'spark',life:.18,sz:bullet.mega?5:3,col:hitColor,glow:bullet.mega?30:18,drag:.8});
  if(bullet.crit)spawnFloat(enemy.cx,enemy.y-10,'CRIT!','#ff44aa',13,.65);
  if(bullet.mega)spawnSW(bullet.x,bullet.y,'#ffffff',48);
  shake(bullet.mega?.1:.05);
  spawnFloat(enemy.cx,enemy.y-8,`-${bullet.dmg}`,hitColor,11,.55);
  // explosive AoE
  if(bullet.explosive){
    spawnSW(bullet.x,bullet.y,'#ff6600',52);
    pEmit(bullet.x,bullet.y,{n:12,spd:155,life:.28,sz:5,col:'#ff6600',glow:20,grav:35,drag:.86});
    for(const e2 of G.enemies){if(!e2.dead&&e2!==enemy&&dist(bullet.x,bullet.y,e2.cx,e2.cy)<48){e2.hurt(Math.round(bullet.dmg*.55));e2.wobble=1;}}
    if(G.boss&&!G.boss.dead&&dist(bullet.x,bullet.y,G.boss.cx,G.boss.cy)<60)G.boss.hurt(Math.round(bullet.dmg*.4));
  }
  if(!bullet.pierce)bullet.dead=true;
}

function onEnemyDied(enemy){
  // reaper chain
  if(enemy.reaperMark){
    spawnSW(enemy.cx,enemy.cy,'#ff00aa',62);
    pEmit(enemy.cx,enemy.cy,{n:14,spd:155,life:.32,sz:5,col:'#ff00aa',glow:22,grav:35,drag:.85});
    for(const e2 of G.enemies){if(!e2.dead&&dist(enemy.cx,enemy.cy,e2.cx,e2.cy)<65){e2.hurt(28);e2.wobble=1;}}
  }
  // chain lightning
  if(G.player.chainLightning){
    const targets=G.enemies.filter(x=>!x.dead&&x!==enemy).sort((a,b)=>dist(enemy.cx,enemy.cy,a.cx,a.cy)-dist(enemy.cx,enemy.cy,b.cx,b.cy)).slice(0,2);
    let prev=enemy;
    for(const t of targets){
      for(let s=0;s<=6;s++){pEmit(lerp(prev.cx,t.cx,s/6)+rnd(-10,10),lerp(prev.cy,t.cy,s/6)+rnd(-10,10),{n:1,spd:5,life:.22,sz:2.5,col:'#88ffff',glow:14,drag:.5});}
      t.hurt(Math.round(G.player.dmgMult*12));t.wobble=1;prev=t;
    }
  }
  // time fracture
  if(G.player.timeCrush)G.slowFields.push({x:enemy.cx,y:enemy.cy,r:88,life:2.0,maxLife:2.0});
  // vampiric
  if(G.player.vampPerKill){G.player.hp=Math.min(G.player.maxHp,G.player.hp+G.player.vampPerKill);pEmit(G.player.cx,G.player.cy,{n:3,spd:35,life:.28,sz:3,col:'#ff4488',glow:12,drag:.7});}
  // soul harvest
  if(G.player.soulHarvest){
    G.player.soulKillBuf=(G.player.soulKillBuf||0)+1;G.player.soulKillTimer=3.0;
    if(G.player.soulKillBuf>=5){G.player.soulKillBuf=0;G.ghosts.push(new GhostAlly(G.player.cx,G.player.cy));spawnFloat(G.player.cx,G.player.cy-38,'GHOST!','#cc44ff',13,1.1);}
  }
  // drops
  G.orbs.push(new XpOrb(enemy.cx,enemy.cy,enemy.xpDrop));
  if(Math.random()<.4)G.orbs.push(new XpOrb(enemy.cx+rnd(-12,12),enemy.cy+rnd(-10,10),Math.floor(enemy.xpDrop*.4)));
  G.coins.push(new GoldCoin(enemy.cx,enemy.cy,enemy.goldDrop));
  if(Math.random()<.12){const wks=Object.keys(WEAPONS).filter(k=>k!=='pistol');G.drops.push(new WeaponDrop(enemy.cx,enemy.cy,wks[Math.floor(Math.random()*wks.length)]));}
  if(enemy.hp<=0&&Math.random()<.08)G.healthpacks.push(new HealthPack(enemy.cx,enemy.cy));
  addKill(enemy.xpDrop,enemy.goldDrop);flash(255,200,50,.08);
}

// ═══════════════════════════════════════════════
// MAIN UPDATE
// ═══════════════════════════════════════════════
function update(dt){
  if(G.paused||G.gameOver)return;
  const p=G.player;
  p.update(dt);
  camUpdate(dt, p.cx, p.cy);
  tickAmbientDust(dt);
  // Exit portal interaction
  if(G.exitPortal&&dist(p.cx,p.cy,G.exitPortal.x,G.exitPortal.y)<36&&ePressed){
    nextFloor();ePressed=false;return;
  }
  // Minimap fog-of-war discovery
  if(G.mapData){
    if(!G.mapData.discovered)G.mapData.discovered=new Uint8Array(G.mapData.COLS*G.mapData.ROWS);
    const T=G.mapData.TILE,COLS=G.mapData.COLS,ROWS=G.mapData.ROWS,disc=G.mapData.discovered;
    const vr=7; // vision radius in tiles
    const ptx=Math.floor(p.cx/T),pty=Math.floor(p.cy/T);
    for(let dy=-vr;dy<=vr;dy++)for(let dx=-vr;dx<=vr;dx++){
      if(dx*dx+dy*dy>vr*vr)continue;
      const nx=ptx+dx,ny=pty+dy;
      if(nx>=0&&ny>=0&&nx<COLS&&ny<ROWS)disc[ny*COLS+nx]=1;
    }
  }
  // Tile hazard / slow
  if(G.mapData){
    const ttx=Math.floor(p.cx/G.mapData.TILE),tty=Math.floor(p.cy/G.mapData.TILE);
    const tile=G.mapData.grid[tty*G.mapData.COLS+ttx]||0;
    if(p.lavaCd>0)p.lavaCd-=dt;
    if(tile===3){
      // Lava / toxic / ice: damage every 0.3s regardless of invuln
      if(!p.lavaCd||p.lavaCd<=0){
        p.lavaCd=0.3;
        const dmg=6+G.floor*1.5|0; // scales with floor: ~6 HP early, ~20 HP late
        p.hp=Math.max(0,p.hp-dmg);
        if(p.hp<=0)p.dead=true;
        flash(220,60,0,.25);shake(.14);
        pEmit(p.cx,p.cy,{n:5,spd:55,life:.22,sz:5,col:'#ff6600',glow:16,grav:0,drag:.7});
        spawnFloat(p.cx,p.cy-22,`-${dmg}`,'#ff6600',12,.6);
      }
      // Also slow the player slightly on hazard tiles
      p.vx*=.82;p.vy*=.82;
    } else {
      p.lavaCd=0;
      if(tile===2){// water — slow
        p.vx*=.65;p.vy*=.65;
      }
    }
  }
  // combo decay
  if(combo>0){comboTimer-=dt;if(comboTimer<=0)combo=0;}
  // slow fields tick
  for(let i=G.slowFields.length-1;i>=0;i--){G.slowFields[i].life-=dt;if(G.slowFields[i].life<=0)G.slowFields.splice(i,1);}

  // wave management
  // Each wave has a finite pool of enemies to kill. Kill them all → grace → next wave.
  // Wave 3 = boss wave (no regular enemies). Kill boss → floor clear → next floor.
  // Boss wave is wave 6 within each floor cycle (waves 1-5 regular, 6 = boss)
  const WAVES_PER_FLOOR=6;
  const isBossWave=(w)=>w%WAVES_PER_FLOOR===0&&w>0;

  if(G.inGrace){
    G.graceTimer-=dt;
    if(G.graceTimer<=0){
      G.inGrace=false;G.wave++;
      G.shopLocked=true; // shop closes when first wave begins
      if(isBossWave(G.wave)){
        const bossRoom=G.mapData?G.mapData.exitRoom:{cx:WORLD_W/2,cy:WORLD_H/2};
        G.boss=new Boss(G.floor);
        G.boss.x=bossRoom.cx-36;G.boss.y=bossRoom.cy-36;
        G.bossSpawned=true;
        G.wavePool=0;G.waveKilled=0;
        showWaveMsg(`⚠ BOSS ⚠`);shake(.3);flash(255,0,0,.28);
      } else {
        const wNum=G.wave%WAVES_PER_FLOOR||5; // wave number within floor 1-5
        G.wavePool=15+G.floor*4+(wNum-1)*4;  // grows quickly per wave and floor
        G.waveKilled=0;G.waveSpawned=0;
        G.spawnInterval=Math.max(.3,1.8-G.floor*.1-(wNum-1)*.12);
        G.maxEnemies=Math.min(22,6+G.floor+(wNum-1)*2);
        G.spawnT=1.0;
        showWaveMsg(`WAVE ${G.wave}`);
      }
    }
  } else {
    const liveEnemies=G.enemies.filter(e=>!e.dead).length;
    if(isBossWave(G.wave)){
      // Boss wave ends when boss is dead (handled in boss-null block below)
    } else {
      G.spawnT-=dt;
      if(G.spawnT<=0&&liveEnemies<G.maxEnemies&&G.waveSpawned<G.wavePool){
        G.enemies.push(spawnEnemy());
        G.waveSpawned++;
        G.spawnT=G.spawnInterval*rnd(.75,1.2);
      }
      if(G.waveSpawned>=G.wavePool&&liveEnemies===0){
        G.inGrace=true;G.graceTimer=3.5;
      }
    }
  }

  // boss
  if(G.boss)G.boss.update(dt,p);
  // enemies
  for(const e of G.enemies)e.update(dt,p);
  // ghosts
  for(let i=G.ghosts.length-1;i>=0;i--){G.ghosts[i].update(dt,p,G.enemies);if(G.ghosts[i].dead)G.ghosts.splice(i,1);}

  // shoot
  if(M.down&&p.tryShoot()){
    p.shotsFired++;
    const w=p.weapon,ang=p.angle;
    const extra=p.extraShots||0;
    const total=w.count+extra;
    const isOverload=p.overload&&(p.shotsFired%8===0);
    const lsBoost=p.lastStand&&p.hp/p.maxHp<.25?1.8:1.0;
    for(let i=0;i<total;i++){
      const spread=total>1?w.spread*(i/(total-1)-.5)*2:0;
      let dm=p.dmgMult*lsBoost;
      const isCrit=p.critChance&&Math.random()<p.critChance;
      const b=new Bullet(p.cx+Math.cos(ang)*22,p.cy+Math.sin(ang)*22,ang+spread+rnd(-.008,.008),w,dm,w.bounce,{
        pierce:!!p.pierce,explosive:!!p.explosive&&w!==WEAPONS.grenades,// grenades have their own AoE
        reaper:!!p.reaper,mega:isOverload,crit:isCrit,
        burnRounds:!!p.burnRounds,poisonRounds:!!p.poisonRounds,freezeRounds:!!p.freezeRounds,
        spdMult:p.projSpdMult||1,
      });
      G.bullets.push(b);
    }
    // grenade special: mark as AoE
    if(w===WEAPONS.grenades){const last=G.bullets[G.bullets.length-1];last.isGrenade=true;last.explosive=true;}
    const mx=p.cx+Math.cos(ang)*24,my=p.cy+Math.sin(ang)*24;
    pEmit(mx,my,{n:isOverload?10:4,spd:isOverload?180:95,life:.09,sz:isOverload?6:3,col:isOverload?'#ffffff':w.col,glow:isOverload?30:16,drag:.7,ang});
    spawnSW(mx,my,isOverload?'#ffffff':w.glow,isOverload?38:16);shake(isOverload?.12:.035);
  }

  // bullets update
  for(const b of G.bullets)b.update(dt);

  // bullet ↔ enemies
  for(const b of G.bullets){
    if(b.dead)continue;
    for(const e of G.enemies){
      if(e.dead)continue;
      const hr=b.mega?20:12;
      if(dist(b.x,b.y,e.cx,e.cy)<hr){
        const wasDead=e.dead;resolveHit(b,e);
        if(e.dead&&!wasDead)onEnemyDied(e);
        if(b.dead)break;
      }
    }
  }

  // bullet ↔ boss
  if(G.boss&&!G.boss.dead){
    for(const b of G.bullets){
      if(b.dead)continue;
      // shields first
      if(G.boss.shieldHp>0){
        for(let i=0;i<G.boss.shieldHp;i++){
          const sa=G.boss.shieldAng+i*(Math.PI*2/G.boss.shieldMax);
          const sx=G.boss.cx+Math.cos(sa)*46,sy=G.boss.cy+Math.sin(sa)*46;
          if(dist(b.x,b.y,sx,sy)<16){b.dead=true;G.boss.shieldHp--;spawnSW(sx,sy,'#44aaff',28);break;}
        }
      }
      if(b.dead)continue;
      if(dist(b.x,b.y,G.boss.cx,G.boss.cy)<40){
        G.boss.hurt(b.dmg);b.dead=true;
        pEmit(b.x,b.y,{n:8,spd:175,type:'spark',life:.2,sz:4,col:'#ff6600',glow:20,drag:.8});
        shake(.06);spawnFloat(G.boss.cx,G.boss.cy-12,`-${b.dmg}`,'#ffaa44',11,.45);
        if(G.boss.dead){
          addKill(G.boss.xpDrop,G.boss.goldDrop);G.score+=G.floor*500;
          flash(255,150,0,.45);
          const wks=Object.keys(WEAPONS).filter(k=>k!=='pistol');
          G.drops.push(new WeaponDrop(G.boss.cx,G.boss.cy,wks[Math.floor(Math.random()*wks.length)]));
          G.drops.push(new WeaponDrop(G.boss.cx+45,G.boss.cy,wks[Math.floor(Math.random()*wks.length)]));
          for(let i=0;i<6;i++)G.coins.push(new GoldCoin(G.boss.cx+rnd(-30,30),G.boss.cy+rnd(-20,20),rnd(12,22)|0));
          // Spawn exit portal at exit room
          const er=G.mapData?G.mapData.exitRoom:{cx:G.boss.cx+100,cy:G.boss.cy};
          G.exitPortal={x:er.cx,y:er.cy};
          spawnFloat(G.boss.cx,G.boss.cy-60,'EXIT PORTAL OPENED!','#44ffaa',16,2.0);
        }
        break;
      }
    }
    // boss bullets → player
    if(p.invuln<=0){
      for(const bb of G.boss.bullets){
        if(bb.dead)continue;
        if(dist(bb.x,bb.y,p.cx,p.cy)<17){
          bb.dead=true;
          if(p.barrierHp>0){p.barrierHp=0;p.barrierCd=10;spawnSW(p.cx,p.cy,'#4488ff',46);spawnFloat(p.cx,p.cy-26,'BLOCKED!','#4488ff',13,.8);continue;}
          p.hurt(bb.dmg);p.invuln=.55+(p.bonusInvuln||0);
          shake(.32);flash(255,30,30,.32);
          pEmit(p.cx,p.cy,{n:10,spd:130,life:.4,sz:rnd(3,6),col:'#cc2222',glow:14,grav:95,drag:.86});
          spawnFloat(p.cx,p.y-10,`-${bb.dmg}`,'#ff3333',13,.75);
          if(p.thorns){G.boss.hurt(p.thorns);spawnFloat(G.boss.cx,G.boss.cy-8,`-${p.thorns}`,'#88ff44',11,.55);}
          if(p.dead&&p.phoenix&&!p.phoenixUsed){p.dead=false;p.hp=Math.floor(p.maxHp*.5);p.phoenixUsed=true;spawnSW(p.cx,p.cy,'#ff6600',100);flash(255,140,0,.65);shake(.65);pEmit(p.cx,p.cy,{n:28,spd:210,life:.48,sz:5,col:'#ff8800',glow:24,drag:.83});for(const e of G.enemies){if(!e.dead&&dist(p.cx,p.cy,e.cx,e.cy)<95)e.hurt(55);}spawnFloat(p.cx,p.cy-38,'PHOENIX!','#ff6600',17,1.4);}
        }
      }
    }
  }

  // enemy projectiles (shooter) → player
  if(p.invuln<=0){
    for(const b of G.bullets){
      if(!b.fromEnemy||b.dead)continue;
      b.life-=dt;if(b.life<=0){b.dead=true;continue;}
      const bd2=btFrozen>0?.08:1;
      b.x+=b.vx*dt*bd2;b.y+=b.vy*dt*bd2;
      if(isSolidTile(b.x,b.y)||b.x<0||b.x>WORLD_W||b.y<0||b.y>WORLD_H){b.dead=true;continue;}
      if(dist(b.x,b.y,p.cx,p.cy)<16){
        b.dead=true;
        if(p.barrierHp>0){p.barrierHp=0;p.barrierCd=10;spawnSW(p.cx,p.cy,'#4488ff',40);spawnFloat(p.cx,p.cy-26,'BLOCKED!','#4488ff',13,.8);continue;}
        p.hurt(b.dmg);p.invuln=.45+(p.bonusInvuln||0);
        shake(.22);flash(50,200,255,.22);
        pEmit(p.cx,p.cy,{n:8,spd:120,life:.35,sz:rnd(2,5),col:'#44ccff',glow:12,grav:80,drag:.86});
        spawnFloat(p.cx,p.y-10,`-${b.dmg}`,'#44ddff',13,.7);
      }
    }
  }

  // enemy ↔ player contact
  const allE=[...G.enemies,...(G.boss&&!G.boss.dead?[G.boss]:[])];
  for(const e of allE){
    if(e.dead||e.contactCd>0||p.invuln>0)continue;
    const er=e instanceof Boss?38:12;
    if(dist(p.cx,p.cy,e.cx,e.cy)<er+13){
      if(p.barrierHp>0){p.barrierHp=0;p.barrierCd=10;spawnSW(p.cx,p.cy,'#4488ff',44);spawnFloat(p.cx,p.cy-26,'BLOCKED!','#4488ff',13,.8);e.contactCd=.8;continue;}
      p.hurt(e.dmg);p.invuln=.6+(p.bonusInvuln||0);e.contactCd=.85;
      shake(.38);flash(255,30,30,.38);
      pEmit(p.cx,p.cy,{n:11,spd:135,life:.42,sz:rnd(3,6),col:'#cc2222',glow:14,grav:95,drag:.86});
      spawnFloat(p.cx,p.y-10,`-${e.dmg}`,'#ff3333',14,.8);
      if(p.thorns){e.hurt(p.thorns);e.wobble=1;spawnFloat(e.cx,e.cy-8,`-${p.thorns}`,'#88ff44',11,.55);}
      if(p.dead&&p.phoenix&&!p.phoenixUsed){p.dead=false;p.hp=Math.floor(p.maxHp*.5);p.phoenixUsed=true;spawnSW(p.cx,p.cy,'#ff6600',100);flash(255,140,0,.65);shake(.65);pEmit(p.cx,p.cy,{n:28,spd:210,life:.48,sz:5,col:'#ff8800',glow:24,drag:.83});for(const ee of G.enemies){if(!ee.dead&&dist(p.cx,p.cy,ee.cx,ee.cy)<95)ee.hurt(55);}spawnFloat(p.cx,p.cy-38,'PHOENIX!','#ff6600',17,1.4);}
    }
  }

  // pickups
  for(const o of G.orbs)o.update(dt,p);
  for(const c of G.coins){c.update(dt,p);if(c.dead&&c.pickedUp)spawnFloat(p.cx,p.cy-18,`+${c.val}⬡`,'#ffcc44',11,.5);}
  for(const h of G.healthpacks){h.update(dt,p);if(h.dead&&h.pickedUp){p.hp=Math.min(p.maxHp,p.hp+h.heal);spawnFloat(p.cx,p.cy-22,`+${h.heal} HP`,'#ff4466',14,.9);pEmit(p.cx,p.cy,{n:8,spd:60,life:.3,sz:4,col:'#ff4466',glow:16,drag:.75});}}
  for(const d of G.drops){d.update(dt,p);if(d.dead){p.weapon=d.w;spawnFloat(p.cx,p.y-28,`${d.w.name}!`,d.w.col,15,1.1);pEmit(p.cx,p.cy,{n:10,spd:110,type:'spark',life:.28,sz:4,col:d.w.col,glow:18,drag:.8});spawnSW(p.cx,p.cy,d.w.glow,46);}}
  for(const ch of G.chests)ch.update(dt,p);
  if(G.shopNPC)G.shopNPC.update(dt,p);

  // prune
  G.bullets=G.bullets.filter(b=>!b.dead);
  G.enemies=G.enemies.filter(e=>!(e.dead&&(e.deathAnim||0)<=0));
  G.orbs=G.orbs.filter(o=>!o.dead);
  G.coins=G.coins.filter(c=>!c.dead);
  G.drops=G.drops.filter(d=>!d.dead);
  G.healthpacks=G.healthpacks.filter(h=>!h.dead);
  G.chests=G.chests.filter(c=>!c.dead);
  if(G.boss&&G.boss.dead&&(G.boss.deathAnim||0)<=0){
    G.boss=null;
    // Boss killed — open exit portal grace then advance floor
    if(G.bossSpawned&&!G.floorClearing){
      G.floorClearing=true;
      showWaveMsg(`FLOOR ${G.floor} CLEAR! · FIND THE EXIT`);shake(.2);flash(100,255,150,.2);
      // No auto-advance — player must reach and use the exit portal (E key)
    }
  }

  if(p.dead)G.gameOver=true;
}

function spawnEnemy(){
  // Spawn in a random room that's not too close to player
  let x,y;
  if(G.mapData&&G.mapData.rooms.length>1){
    const farRooms=G.mapData.rooms.filter(r=>dist(r.cx,r.cy,G.player.cx,G.player.cy)>350);
    const pool=farRooms.length?farRooms:G.mapData.rooms;
    const rm=pool[Math.floor(Math.random()*pool.length)];
    const TILE=G.mapData.TILE;
    x=rm.cx+rnd(-(rm.w*TILE/2-20),rm.w*TILE/2-20);
    y=rm.cy+rnd(-(rm.h*TILE/2-20),rm.h*TILE/2-20);
  } else {
    // fallback: off-screen edges
    const edge=Math.floor(Math.random()*4);
    const cx=G.player.cx,cy=G.player.cy;
    if(edge===0){x=cx+rnd(-400,400);y=cy-rnd(300,500);}
    else if(edge===1){x=cx+rnd(300,500);y=cy+rnd(-300,300);}
    else if(edge===2){x=cx+rnd(-400,400);y=cy+rnd(300,500);}
    else{x=cx-rnd(300,500);y=cy+rnd(-300,300);}
    x=clamp(x,50,WORLD_W-50);y=clamp(y,50,WORLD_H-50);
  }
  const f=G.floor,r=Math.random();
  const eliteChance=Math.min(.20,.04+f*.018);
  const isElite=r<eliteChance;
  let e;
  // Spawn table expands with floor: earlier floors are forgiving, later floors brutal
  if(f>=8){
    const t=Math.random();
    if(t<.18)e=new EnemyCharger(x-16,y-16,f);
    else if(t<.36)e=new EnemyBrute(x-20,y-20,f);
    else if(t<.54)e=new EnemyShooter(x-12,y-12,f);
    else if(t<.72)e=new EnemyBat(x-10,y-10,f);
    else e=new EnemySlime(x-13,y-13,f);
  } else if(f>=6){
    const t=Math.random();
    if(t<.20)e=new EnemyCharger(x-16,y-16,f);
    else if(t<.38)e=new EnemyBrute(x-20,y-20,f);
    else if(t<.58)e=new EnemyShooter(x-12,y-12,f);
    else if(t<.76)e=new EnemyBat(x-10,y-10,f);
    else e=new EnemySlime(x-13,y-13,f);
  } else if(f>=4){
    const t=Math.random();
    if(t<.16)e=new EnemyCharger(x-16,y-16,f);
    else if(t<.36)e=new EnemyShooter(x-12,y-12,f);
    else if(t<.58)e=new EnemyBat(x-10,y-10,f);
    else e=new EnemySlime(x-13,y-13,f);
  } else if(f>=3){
    const t=Math.random();
    if(t<.25)e=new EnemyShooter(x-12,y-12,f);
    else if(t<.50)e=new EnemyBat(x-10,y-10,f);
    else e=new EnemySlime(x-13,y-13,f);
  } else {
    // Floors 1-2: only slimes and bats
    e=Math.random()<.35?new EnemyBat(x-10,y-10,f):new EnemySlime(x-13,y-13,f);
  }
  if(isElite)e.makeElite();
  return e;
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(dt){
  // World layer: camera + shake transform
  ctx.save();
  ctx.translate(SX,SY);ctx.rotate(SR);
  // Apply camera
  ctx.save();ctx.translate(-CAM.x,-CAM.y);

  drawWorld();

  // Slow fields (world space)
  for(const s of G.slowFields){
    if(!onScreenPt(s.x,s.y,s.r+20))continue;
    const a=(s.life/s.maxLife)*.25;
    ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='#44eeff';ctx.shadowColor='#44eeff';ctx.shadowBlur=8;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(40,200,220,.04)';ctx.fill();ctx.restore();
  }

  drawFX();
  drawExitPortal();
  drawExitPortalArrow();

  if(G.boss)G.boss.draw();
  for(const e of G.enemies){if(onScreenPt(e.cx,e.cy,60))e.draw();}
  if(!G.gameOver)G.player.draw();
  if(G.ghosts)for(const g of G.ghosts)g.draw();
  for(const b of G.bullets){
    if(b.fromEnemy){
      if(!b.dead&&onScreenPt(b.x,b.y,20)){
        ctx.save();ctx.shadowColor=b.col||'#44ddff';ctx.shadowBlur=14;
        ctx.fillStyle=b.col||'#44ddff';ctx.globalAlpha=.88;ctx.beginPath();ctx.arc(wx(b.x),wy(b.y),6,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.shadowBlur=0;ctx.beginPath();ctx.arc(wx(b.x),wy(b.y),3,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
    } else if(onScreenPt(b.x,b.y,20)) b.draw();
  }
  if(G.boss)for(const bb of G.boss.bullets)bb.draw();
  for(const o of G.orbs){if(onScreenPt(o.x,o.y,20))o.draw();}
  for(const c of G.coins){if(onScreenPt(c.x,c.y,20))c.draw();}
  for(const h of G.healthpacks){if(onScreenPt(h.x,h.y,30))h.draw();}
  for(const d of G.drops){if(onScreenPt(d.x,d.y,30))d.draw();}
  for(const ch of G.chests){if(onScreenPt(ch.x,ch.y,30))ch.draw();}
  if(G.shopNPC)G.shopNPC.draw();

  ctx.restore(); // end camera
  ctx.restore(); // end shake

  // Screen-space flash overlays
  if(FL.a>0){ctx.fillStyle=`rgba(${FL.r},${FL.g},${FL.b},${FL.a.toFixed(3)})`;ctx.fillRect(0,0,W,H);}
  if(btFrozen>0){ctx.save();ctx.globalAlpha=.12;ctx.fillStyle='rgba(80,150,255,.1)';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(100,180,255,.28)';ctx.lineWidth=7;ctx.strokeRect(0,0,W,H);ctx.restore();}

  // HUD (screen space, no transform)
  if(!G.gameOver&&!G.paused){drawHUD();drawMinimap();}
  drawWaveMsg(dt);
  if(G.levelUpChoices)drawLevelUp();
  if(G.shopOpen)drawShop();
  if(G.gameOver)drawGameOver(dt);
}

// ═══════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════
let lastT=null;
function tick(ts){
  const dt=lastT===null?0:Math.min((ts-lastT)/1000,1/15);
  lastT=ts;NOW+=dt;
  tickFX(dt);
  if(!G.gameOver&&!G.paused)update(dt);
  render(dt);
  if(G&&G.shopOpen)G.shopOpenTimer=(G.shopOpenTimer||0)+dt;
  M.clicked=false;M.rclicked=false;ePressed=false;
  requestAnimationFrame(tick);
}

buildTextures(1);
initGame();
requestAnimationFrame(tick);
</script>
